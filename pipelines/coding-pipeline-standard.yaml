id: coding-pipeline-standard
name: "Coding Pipeline Standard"
description: "10-phase coding pipeline with 3-phase spec loop: spec → behavioral → adversary. Each agent writes ONE file, eliminating the bifurcation bug where secondary artifacts (spec-behavioral.md) were never written to disk. Adversarial spec review, engine-verified behavioral validation after EVERY code change."
author: "Toscan"
version: "2.0.0"
category: "code"
tags: [code, development, review, testing, pipeline]
use_cases:
  - "Feature implementation with automated code review"
  - "Bug fixes with test verification"
  - "Refactoring with regression testing"

config_schema:
  type: object
  required: [issue_title, issue_body, repo_path, branch_name, issue_number, repo_url]
  properties:
    issue_title:
      type: string
      description: "GitHub issue title"
    issue_body:
      type: string
      description: "Full issue description with requirements and acceptance criteria"
    repo_path:
      type: string
      description: "Absolute path to the repository"
    branch_name:
      type: string
      description: "Git branch name to create/use"
    test_command:
      type: string
      default: ""
      description: "Command to run tests. REQUIRED if config.language is not python (the engine default falls back to 'python3 -m pytest tests/ -x -q' only for python). Examples: 'npm test -- --watch=false', 'pnpm vitest run', 'go test ./...', 'bash scripts/verify-<issue>.sh'."
    files_context:
      type: string
      default: ""
      description: "Key files and their purpose — helps the builder understand the codebase"
    language:
      type: string
      default: "python"
    style_guide:
      type: string
      default: "Follow existing code style. Add docstrings. Type hints where practical."
    acceptance_test_file:
      type: string
      default: ""
      description: "Optional: path to a pre-written acceptance test file. If empty, one is generated from the spec."
    issue_number:
      type: integer
      description: "GitHub issue number — auto-injected into PR body as 'Closes #N'"
    repo_url:
      type: string
      description: "GitHub repo URL (e.g. https://github.com/ToscanAI/orchestration-engine)"
    acceptance_max_retries:
      type: integer
      default: 3
      description: "Max implement→acceptance_run loop iterations (set max_iterations on implement and acceptance_run phases)"
    ui_primitive_paths:
      type: string
      default: ""
      description: "Sub-check 7d inventory inputs (Phase-0 existing_symbols_inventory). Newline-separated list of glob patterns pointing at the project's UI primitive package(s) — e.g. `packages/ui/src/components/*.{tsx,jsx,vue,svelte}` or `apps/web/components/ui/*.tsx`. Phase 0 greps these for existing primitives (Dialog, Badge, Alert, Popover, Card, Tooltip, etc.) so downstream phases can consume rather than re-author. Empty default = Phase 0 skips the UI-primitive section (acceptable for backend-only projects)."
    lib_paths:
      type: string
      default: ""
      description: "Sub-check 7d inventory inputs. Newline-separated globs pointing at project shared libraries — e.g. `apps/web/lib/*.ts`, `packages/*/src/utils/*.ts`. Phase 0 greps these for exported helpers (formatters, parsers, hooks, date/time utilities) so downstream phases can detect helper-name collisions early."
    action_dirs:
      type: string
      default: ""
      description: "Sub-check 7d inventory inputs. Newline-separated globs pointing at adjacent action/server-route/hook patterns to mirror — e.g. `apps/web/app/actions/*.ts`, `app/api/**/*.ts`, `apps/web/components/**/hooks/*.ts`. Phase 0 inventories these so SPEC + IMPLEMENT can mirror canonical patterns (auth flow, ownership check, error mapping) instead of re-inventing."
    workspace_barrels:
      type: string
      default: ""
      description: "Sub-check 7d inventory inputs. Newline-separated glob patterns pointing at workspace package barrels — e.g. `packages/*/src/index.ts`, `pkg/*/index.go`. Phase 0 enumerates the exported symbols so SPEC + IMPLEMENT consume cross-package symbols (saveResponse, loadResponses, computeProgressPercent, etc.) rather than duplicating."
    phase0_hard_gate:
      type: boolean
      default: false
      description: "POLICY FLAG (added v4.2, 2026-05-24). When false (default), Phase 0 degrades gracefully: if the existing_symbols_inventory phase exhausts retries or fails, the orchestrator falls through to SPEC with an empty/partial `existing_symbols.md` (downstream phases revert to ad-hoc grep per the v4 backward-compat short-circuit). When true, consumers signal stricter intent: SPEC + SPEC_ADVERSARY + IMPLEMENT prompts elevate the absence of a valid `existing_symbols.md` to a [BLOCKER]; the orchestrator should HALT rather than fall through. The YAML's default `transitions.exhausted: spec` honors graceful degradation; consumers who want true HALT can fork-override `transitions.exhausted: null` (terminate the run) or use the wrapper-orchestrator pattern documented in CHANGELOG v4.2. Motivation: Wave 5/6 redundancy retro in ToscanAI/value-investing (2026-05-24) measured 32 PRs / 19 days producing 13 new duplication groups — late-catch under graceful degradation is the dominant failure mode for that consumer."

example_input:
  issue_title: "Sample issue title"
  issue_body: "Sample issue description and requirements."
  repo_path: "/path/to/repo"
  branch_name: "fix/issue-123"
  issue_number: 123
  repo_url: "https://github.com/ToscanAI/orchestration-engine"

phases:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PHASE 0 — EXISTING-SYMBOLS INVENTORY (sub-check 7d sticky artifact)
  #
  # Added v4 (2026-05-22): the v3 yaml caught sub-check 7d (re-implementation
  # of existing symbol) at THREE late checkpoints — SPEC_ADVERSARY R1 ([divergence]
  # finding requiring a re-spec round), IMPLEMENT (BLOCKED report routed via
  # seal-break or a retroactive refactor), REVIEW ([MAJOR][correctness]
  # requiring a refactor commit on top). Production audit pattern: two
  # consecutive feature PRs each shipped a 7d-duplication-then-fix cycle —
  # one via post-impl refactor (~1hr cost), one via re-spec round. The catch
  # was consistently LATE — after authoring had begun.
  #
  # Strengthened v4.2 (2026-05-24) — Wave 5/6 retro data from the
  # ToscanAI/value-investing consumer. Empirical measurement:
  #
  #   Period         Days  PRs merged  New dup groups
  #   05-04 → 05-16  12    24 PRs      7 (Wave 5: N5-1..N5-7)
  #   05-16 → 05-23  7     8 PRs       6 (Wave 6: C1, C2, C4-C7)
  #   total          19    32 PRs      13
  #
  # The pre-v4 mode (Phase 0 absent, sub-check 7d caught only at REVIEW)
  # produced ~1 dup group per 2.5 PRs across both project epics
  # (EPIC-16 hi-fi UI sweep + EPIC-10 dashboard). Phase 0 (v4) moves catch
  # from REVIEW → SPEC; v4.2 adds the EXTEND verdict (below) to name the
  # "parameterize existing helper to share both call sites" pattern that
  # was previously implicit under "consume" and frequently missed when
  # the existing helper had a slightly narrower signature than the new
  # use site needed.
  #
  # Phase 0 fixes this by producing a sticky `{output_dir}/existing_symbols.md`
  # inventory BEFORE Phase 1a SPEC. Every subsequent phase (spec, behavioral,
  # spec_adversary, acceptance_test, test_adversary, implement, review)
  # reads this inventory and cross-checks against it. The 7d catch becomes
  # AT-AUTHORING-TIME instead of POST-AUTHORING.
  #
  # The inventory has 4 standard sections:
  #   1. UI primitives (from config.ui_primitive_paths) — Dialog, Badge,
  #      Alert, Popover, Card, Tooltip, etc.
  #   2. Project shared libraries (from config.lib_paths) — date/time
  #      formatters, debounce hooks, browser-event listeners, etc.
  #   3. Adjacent action/hook patterns (from config.action_dirs) — auth +
  #      ownership boilerplate; error-mapping patterns; mirror-byte-shape
  #      anchors.
  #   4. Workspace barrels (from config.workspace_barrels) — cross-package
  #      symbols already exported (saveResponse, computeProgressPercent, etc.).
  #
  # The phase is OPTIONAL: if all 4 config inputs are empty, Phase 0 writes
  # a minimal `existing_symbols.md` with the 4 section headers + an "(empty —
  # consumer did not provide inventory inputs)" stub line per section. The
  # downstream phases still read the file but treat empty sections as
  # "no constraint" (revert to grep-during-authoring behavior).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # Phase 0: Existing-symbols inventory
  - id: existing_symbols_inventory
    name: "Existing-symbols inventory (sub-check 7d pre-flight)"
    description: "Greps the project for existing UI primitives, shared libraries, adjacent action/hook patterns, and workspace-barrel exports. Writes a sticky `existing_symbols.md` artifact read by every subsequent phase. Resolves the late-catch problem for sub-check 7d (re-implementation of existing symbol)."
    model_tier: sonnet
    thinking_level: medium
    max_iterations: 2
    transitions:
      success: spec
      failed: existing_symbols_inventory
      timeout: existing_symbols_inventory
      exhausted: spec  # graceful degradation — if inventory fails twice, fall through to SPEC with an empty inventory (downstream phases revert to ad-hoc grep per the backward-compat short-circuit clause in REVIEW)
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the EXISTING_SYMBOLS_INVENTORY phase (Phase 0). Your output feeds every subsequent phase. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a codebase-survey specialist. Your job is to produce a STRUCTURED inventory of existing symbols (UI primitives, shared libraries, adjacent action/hook patterns, workspace barrels) so downstream phases can CONSUME rather than RE-AUTHOR them.

      ## GROUND TRUTH — The Issue This Inventory Serves
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The inventory you produce must surface symbols RELEVANT to this issue (don't dump the entire codebase — focus on symbols a SPEC author would plausibly want to use when implementing this feature).

      ## Repository
      **Path:** {config[repo_path]}
      **Language:** {config[language]}

      ## Grep targets (from config; newline-separated globs)

      ### UI primitives
      {config[ui_primitive_paths]}

      ### Project shared libraries
      {config[lib_paths]}

      ### Adjacent action / hook / route patterns
      {config[action_dirs]}

      ### Workspace barrels
      {config[workspace_barrels]}

      If a section's config input is EMPTY, write the section header + a single line `(empty — consumer did not provide inventory inputs for this category)` and move to the next section. Downstream phases will treat the empty section as "no constraint" but still benefit from the non-empty ones.

      ## Task

      For each non-empty section, expand the globs (use `ls`, `find`, or shell glob expansion via Bash), then for each matching file extract the exported public symbols. Recommended pattern per language:

      - **TypeScript / JavaScript**: grep `^export (const|function|class|interface|type|default)`; record symbol name + the file it's exported from.
      - **Python**: grep `^def `/`^class ` at module top-level + scan `__all__` if present.
      - **Go**: grep `^func [A-Z]`/`^type [A-Z]` (capitalized = public); scan package barrels.
      - **For UI primitives**: extract component name + props-type name + the file path so SPEC can reference precisely (e.g. `Dialog` from `packages/ui/src/components/dialog.tsx` with `DialogProps` type).

      ### Sibling-shape auto-expansion (added 2026-05-31 — post-Wave-8 dedup audit)

      The 4 config-driven grep targets above are STARTING points, not the complete inventory. ADDITIONALLY parse the issue body + spec context for any file path or directory the issue proposes touching (e.g. "creates `apps/web/app/api/test/<x>/route.ts`", "adds `packages/<pkg>/src/<file>.ts`", "renders new `apps/web/components/<dir>/<file>.tsx`"). For EACH such proposed path, enumerate ALL sibling files of the same shape and grep them too — so when the issue proposes `apps/web/app/api/test/email-probe/route.ts`, the inventory MUST grep `apps/web/app/api/test/*/route.ts`; when proposing `apps/web/components/portfolio/<new>.tsx`, MUST enumerate ALL existing `apps/web/components/portfolio/*.tsx`. Group these findings under a new section header (`## 1.5 Sibling-shape paths the spec touches (auto-expanded from issue body)`) listing each proposed path and its enumerated siblings with their exported symbols.

      Lesson (post-Wave-8 audit 2026-05-31): a ToscanAI/value-investing consumer PR shipped 7 portfolio components in one PR, each with its own copy-pasted `formatMoney/formatPct/formatDecimal` triplet — Phase 0 inventory was greenfield-scoped to the NEW components only and never enumerated the existing sibling components in the same directory, so no agent saw the convergence at SPEC time. Sibling-shape auto-expansion catches this at Phase 0.

      Aim for a curated, high-signal inventory:
      - ≤ 50 entries per section (if a section has >50 candidates, group them or filter to most-likely-relevant).
      - Each entry: `<symbol-name>` ← `<file-path>:<line>` ← (optional) one-line description.
      - For UI primitives: include the prop-type name AND any variants/options (so SPEC can reference `<Badge variant="..." />` shapes precisely).
      - For adjacent action patterns: extract the canonical try/catch/auth/ownership boilerplate as a code-snippet anchor (file:line range), so SPEC + IMPLEMENT can `mirror byte-shape`.

      ## Output

      Write your inventory to `{output_dir}/existing_symbols.md`. Use this exact section structure (so downstream phases have stable anchors):

      ```markdown
      # Existing-symbols inventory for issue #{config[issue_number]}

      Inventory date: <ISO-8601 date>
      Repository: {config[repo_path]}
      Issue: {config[issue_title]}

      ## 1. UI primitives (consume — do NOT re-author)

      <one entry per primitive, OR `(empty — consumer did not provide inventory inputs)` if the config input is empty>

      ## 2. Project shared libraries

      <one entry per exported helper, OR empty stub>

      ## 3. Adjacent action / hook / route patterns (mirror byte-shape)

      <one entry per pattern + the file:line range to mirror, OR empty stub>

      ## §3a. Pre-existing dual-path helpers (regex heuristic, may have false positives)

      For every helper in §2 (project shared libraries) whose body contains a multi-branch return (regex heuristic: `grep -B 8 "return [^;]*;" <file> | grep "if (" | head -50`), record the `file:line` and a one-line description of WHY the branching exists (e.g. "SB#2 fixture carve-out + production fallback"). Acknowledged false-positive rate: legitimate guard-clause patterns will surface here too. SPEC reads this list and considers EXTEND-ing an existing dual-path helper (per the EXTEND verdict in §5) before authoring a new one — particularly when the new use site needs the same multi-branch shape (e.g. fixture-stub short-circuit + production fallback). The §3a sub-section is OPTIONAL: if §2 is empty OR the regex returns nothing, write `(empty — no multi-branch helpers in shared libraries OR §2 inventory is empty)` and downstream phases treat as "no constraint".

      <one entry per dual-path helper + the file:line + branching rationale, OR empty stub>

      ## 4. Workspace barrels (consumable cross-package imports)

      <one entry per exported package symbol, OR empty stub>

      ## 5. Consume-vs-author guidance (sub-check 7d enforcement)

      Per sub-check 7d (HARD RULE in IMPLEMENT phase): before authoring ANY new symbol that overlaps with sections 1-4 above, downstream agents MUST pick exactly one of four verdicts per overlap:

      1. **CONSUME** (preferred) — import the existing symbol byte-identical, no signature change. SPEC's Files-to-Modify lists the import-add at the call site; nothing else changes.
      2. **EXTEND** (added v4.2, 2026-05-24; §3a wired in v4.3, 2026-05-26) — parameterize the existing symbol (add an options arg / safe-superset wrapper / accept a path or callback) so the existing call site AND the new call site both consume the same source. The existing symbol moves nowhere; its contract widens. SPEC's Files-to-Modify describes the parameterization in Implementation Steps; SPEC's Files-to-Create lists nothing new. Use when CONSUME is "almost" but the new use site needs one more arg / one slightly different code path. This was the dominant Wave 5/6 pattern in ToscanAI/value-investing: N5-1 took a private fixture loader and added a `fixturePath` parameter so 5 panel modules shared it instead of inlining 5 copies of the 16-field AnnualFacts builder. **Includes EXTEND-ing an existing dual-path helper surfaced in §3a** — when the new use site needs the same multi-branch shape an existing helper already implements (e.g. fixture short-circuit + production fallback), prefer EXTEND over authoring a new dual-path helper that would itself trigger the 7e intra-symbol duplication audit downstream.
      3. **DIVERGENT** — a near-equivalent that has a contract-required difference (different sort order, different precision, different sealed string). NOT duplication — but the spec MUST include a `## Divergence justification` subsection naming the existing symbol and the contract-required difference. SPEC's Files-to-Create lists the new symbol with a clear divergence rationale.
      4. **BLOCKED** — if consume / extend are both impossible (e.g. cross-package boundary not in scope, the existing copy is test-scope but you need prod-scope), return: `BLOCKED: 7d-duplication — <new-symbol> duplicates <existing path:line>; consolidating needs <shared module> not in the spec; recommend spec amendment.` Route back to the orchestrator for a scope decision.

      Verdict labels (CONSUME / EXTEND / DIVERGENT / BLOCKED) appear in §6 below + are quoted verbatim by SPEC + SPEC_ADVERSARY + REVIEW for stable cross-phase tracking.

      ## 6. SPEC's proposed new symbols (filled in by Phase 1a SPEC; cross-checked at every subsequent phase)

      Each entry uses this format so verdicts are scannable:

      ```
      - **<symbol-name>** (verdict: CONSUME | EXTEND | DIVERGENT | NEW-OK)
        Existing: <path:line or "(none — genuinely new)">
        Rationale: <one line>
      ```

      NEW-OK = genuinely new; no overlap with sections 1-4. Use only when grep returned zero plausibly-related symbols.

      <initially empty; SPEC adds entries as it authors new files/symbols>
      ```

      Be terse: this file is read by every downstream agent, so concision matters. Aim for ≤ 200 lines total.

      ## CRITICAL: do NOT make up symbols

      Only record symbols you have empirically verified via grep / find / cat. Do NOT speculate. If a section is empty (config input absent OR globs match nothing), use the stub line — do NOT invent placeholder entries.

      After writing the file, respond with a brief 3-line summary:
      1. Total symbols inventoried per section (e.g. "UI: 18, Lib: 4, Actions: 7, Barrels: 12")
      2. Highest-signal entries the SPEC author should consider for this issue
      3. Any grep target where the config input pointed at a non-existent path (orchestrator escalation candidate)


  - id: spec
    name: "Implementation Spec"
    description: "Interpret the issue into an implementation plan (Section B). Does NOT write behavioral contracts — that's the behavioral agent's job."
    model_tier: sonnet
    thinking_level: high
    max_iterations: 3
    transitions:
      success: behavioral
      failed: spec
      timeout: spec
      exhausted: postmortem_spec
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the SPEC phase (1a/3) of the spec loop. Your output feeds the BEHAVIORAL phase — not the adversary directly. Write implementation guidance only. Do not write behavioral contracts. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a senior developer interpreting a GitHub issue into an implementation plan.

      ## GROUND TRUTH — The Issue You Are Implementing
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      Your implementation spec MUST be about this issue. Do NOT write a spec for any other system or feature.

      ## Repository
      **Path:** {config[repo_path]}
      **Branch:** {config[branch_name]}
      **Language:** {config[language]}

      ## Codebase Context
      {config[files_context]}

      ## Existing-symbols inventory (Phase 0 artifact — sub-check 7d sticky reference)

      Read `{output_dir}/existing_symbols.md` BEFORE proposing any new file/symbol/component. Sections 1-4 enumerate the project's UI primitives, shared libraries, adjacent action/hook patterns, and workspace barrels available for consumption. For EVERY new symbol your spec proposes (in §B.3 Files-to-Create or §B.2 Files-to-Modify), assign exactly ONE of four verdicts (per §5 in existing_symbols.md):

      1. **CONSUME** (preferred) — import the existing symbol byte-identical. Cite the existing entry in your spec.md (e.g. "uses `Dialog` from `packages/ui/src/components/dialog.tsx`"). Files-to-Modify lists the import-add at the call site.
      2. **EXTEND** (v4.2) — parameterize the existing symbol so the existing call site AND the new call site both consume the same source. Document the parameterization (added arg / options object / safe-superset wrapper) in Implementation Steps. Files-to-Create lists NOTHING new; the existing symbol's contract widens. Use when CONSUME is "almost" but the new use site needs one more arg / one slightly different code path. EXTEND is the right verdict in ~40% of v4 wave-5/6 redundancy retro cases (ToscanAI/value-investing data; was previously masked under "consume").
      3. **DIVERGENT** — near-equivalent with a contract-required difference (different sort order, different sealed string, different precision). Add a `## Divergence justification` subsection naming the existing symbol + the contract-required reason. Files-to-Create lists the new symbol explicitly.
      4. **NEW-OK** — genuinely new; no overlap with sections 1-4. Files-to-Create lists the new symbol. Use only when grep returned zero plausibly-related symbols.

      **Append every proposed new symbol** to inventory §6 ("SPEC's proposed new symbols") with the verdict (CONSUME / EXTEND / DIVERGENT / NEW-OK) so Phase 1b BEHAVIORAL + every subsequent phase has a stable reference.

      A new symbol that overlaps with sections 1-4 WITHOUT one of the four explicit verdicts will be flagged `[divergence]` at SPEC_ADVERSARY (R1 cost: re-spec round) and `[MAJOR][correctness]` at REVIEW (Phase 8 cost: refactor commit). The early catch via existing_symbols.md saves the round-trip.

      ## Previous Work
      {phase_summary}

      ## Prior Rounds
      {iteration_history}

      ## Iteration Context
      If prior rounds exist above, this is a REVISION round. The adversary flagged issues with the behavioral contracts AND/OR the implementation plan. Read the adversary's findings and adjust your implementation guidance to support any tightened contracts.
      If no prior rounds exist, this is round 1.

      ## Task
      Produce an implementation spec containing ONLY Section B (implementation guidance). Do NOT write behavioral contracts — a separate agent handles that.

      ### Section B: Implementation Guidance
      1. **Problem Statement** — What exactly needs to change and why
      2. **Files to Modify** — List each file with what changes are needed
      3. **Files to Create** — Any new files with their purpose
      4. **Implementation Steps** — Ordered steps, specific enough to code from
      5. **Risk Assessment** — What could break, backward compatibility concerns
      6. **Observable Outcomes** — For each change, describe what a user/caller can observe (exit codes, stdout content, return values, error messages). The behavioral agent will use these to write tight contracts.

      Be specific. Reference actual file paths and function names from the codebase context.

      **CRITICAL INSTRUCTIONS FOR REVISION ROUNDS:**
      1. Read the EXISTING file at {output_dir}/spec.md
      2. Read the adversary's findings from the most recent round above
      3. Fix ONLY the sections related to adversary findings — do not rewrite unflagged sections
      4. Implementation steps the adversary did NOT flag MUST remain byte-identical
      5. If findings relate to implementation details leaking into behavioral contracts, adjust your spec to clearly separate observable outcomes from internal implementation
      6. If findings relate to missing edge cases, add implementation steps for those cases and describe their observable outcomes
      7. If findings relate to divergence between spec and behavioral contracts, update your spec to match

      Think of this as a code review fix: apply the minimum targeted edit. Do not refactor the whole file.
      A full rewrite wastes tokens and loses adversary-approved content. Surgical edits only.

      Write your implementation spec to {output_dir}/spec.md

  # Phase 1b: Behavioral Contracts (Section A only)
  - id: behavioral
    name: "Behavioral Contracts"
    description: "Write behavioral contracts (Section A) from the issue + implementation spec. Reads spec.md but outputs ONLY observable behavior — no implementation details."
    model_tier: sonnet
    thinking_level: high
    max_iterations: 3
    transitions:
      success: spec_adversary
      failed: behavioral
      timeout: behavioral
      exhausted: postmortem_spec
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the BEHAVIORAL phase (1b/3) of the spec loop. Your output feeds the adversary. Write behavioral contracts only — describe WHAT the system does, not HOW. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a behavioral contract specialist. Your job is to translate an implementation spec into precise, testable behavioral contracts.

      ## GROUND TRUTH — The Feature You Are Writing Contracts For
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      Your behavioral contracts MUST describe the feature above. Do NOT write contracts for any other system, project, or feature. If the implementation spec describes a different feature than the issue above, write contracts based on the ISSUE — not the spec.

      ## Implementation Spec
      Read the implementation spec at: {output_dir}/spec.md
      This describes HOW the feature will be built. Use it to understand the system,
      but DO NOT copy implementation details into your behavioral contracts.

      ## Existing-symbols inventory (Phase 0 sticky reference)

      Read `{output_dir}/existing_symbols.md` (sections 1-4 = inventory; §6 = SPEC's proposed new symbols). When a behavioral contract names a symbol, CITE the canonical entry from the inventory when one exists. For example: prefer "When user clicks the `Restore this version` button (within the `Dialog` primitive from `packages/ui/src/components/dialog.tsx`), ..." over "When user clicks the popover restore button, ..." — the contract is more precise AND establishes the consume-not-rebuild expectation downstream phases will verify.

      For NEW symbols the spec proposes (inventory §6), cite them under their proposed name; the IMPLEMENT phase will author them.

      ## Previous Work
      {phase_summary}

      ## Prior Rounds
      {iteration_history}

      ## Iteration Context
      If prior rounds exist above, this is a REVISION round. The adversary flagged specific weaknesses in the behavioral contracts. Fix ONLY the flagged issues. Do NOT rewrite contracts the adversary did not flag.
      If no prior rounds exist, this is round 1.

      ## Task
      Write behavioral contracts describing WHAT the system should do. Use this format:
      - "When [action/input], the system [expected behavior]"
      - "Given [precondition], calling [operation] produces [outcome]"
      - "If [edge case], the system [graceful behavior]"

      ### Rules
      - DO NOT name internal functions, private methods, or class names
      - DO NOT specify data structures, variable names, or implementation patterns
      - DO reference exact observable values: exit codes, stdout content, stderr messages, return formats
      - ❌ Wrong: "The system calls `PipelineRunner.dry_run()`"
      - ✅ Right: "When `--mode dry-run` is specified, no API calls are made and phase names are printed to stdout"
      - ❌ Wrong: "Add `_extract_code_quality()` method"
      - ✅ Right: "When code quality results are available, the composite score includes them"

      ### Coverage checklist (mandatory)
      For EACH feature path described in the implementation spec, ensure you have contracts covering:
      1. **Happy path** — what happens when everything works (include observable output: stdout, return value, exit code)
      2. **Error paths** — what happens on each failure mode (include exact error messages or required substrings)
      3. **Edge cases** — boundary conditions, empty inputs, invalid values
      4. **Interactions** — what happens when features combine (e.g., flags + modes)

      A contract that only specifies an exit code without observable output is TRIVIALLY satisfiable. Always include what the user can SEE or RECEIVE.

      ### CRITICAL INSTRUCTIONS FOR REVISION ROUNDS
      1. Read the EXISTING file at {output_dir}/behavioral.md
      2. Read the adversary's findings from the most recent round above
      3. Fix ONLY the flagged contracts — do not rewrite unflagged ones
      4. Contracts the adversary previously approved MUST remain byte-identical
      5. If the adversary flagged a "missing edge case", add a new contract for it
      6. If the adversary flagged "leakage", remove the internal reference and describe the observable outcome instead
      7. If the adversary flagged "vague", make the contract concrete with specific observable values (exit codes, exact strings, regex patterns)
      8. If the adversary flagged "divergence", align the contract with what the implementation spec describes

      Think of this as a code review fix: apply the minimum targeted edit. Do not refactor the whole file.
      A full rewrite wastes tokens and loses adversary-approved content. Surgical edits only.

      Write your behavioral contracts to {output_dir}/behavioral.md

  # Phase 1c: Adversarial Spec Review
  - id: spec_adversary
    name: "Spec Adversary Review"
    description: "Adversarially review behavioral contracts AND implementation spec. Checks for vague contracts, trivial satisfaction, missing edge cases, implementation leakage, and divergence between spec and contracts."
    model_tier: sonnet
    thinking_level: high
    max_iterations: 3
    transitions:
      approve: acceptance_test
      request_changes: spec
      exhausted: postmortem_spec
      failed: spec_adversary
      timeout: spec_adversary
      success: spec  # fallback: if verdict extraction fails, loop back conservatively (issue #680)
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the ADVERSARY phase (1c/3) of the spec loop. Your verdict determines whether behavioral contracts are strong enough to drive acceptance tests. On REQUEST_CHANGES, both the spec and behavioral agents will see your findings. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are an adversarial spec reviewer. Your job is to find weaknesses in behavioral contracts BEFORE acceptance tests are written against them.

      ## GROUND TRUTH — The Issue These Contracts Must Cover
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The behavioral contracts and implementation spec you are about to review MUST describe the feature in the issue above. Before applying your five checks, verify that `spec.md` and `behavioral.md` actually describe THIS issue. If either file describes a different system, project, or feature (e.g. a CLI tool when the issue is about a UI component), your verdict is `REQUEST_CHANGES` with a single finding:

        [divergence] spec.md / behavioral.md describes <other topic> instead of the issue "<issue title>" — both files must be rewritten to address the actual issue

      Do NOT invent findings about features that are not in the issue above. Every finding you raise must trace back to a specific contract or spec section that exists in the files you read.

      ## Previous Work (for context only — do NOT re-raise findings already addressed)
      {phase_summary}

      ## Prior Rounds
      {iteration_history}

      ## Iteration Context
      If prior rounds exist above, do NOT repeat findings that have been addressed. Only raise findings that are STILL present in the current files.

      Read the behavioral contracts at: {output_dir}/behavioral.md
      Read the implementation spec at: {output_dir}/spec.md

      ## Changes Since Last Round
      {phase_diff}

      If the above section is non-empty, focus your review on what CHANGED. Do not re-raise findings on unchanged sections.

      ## Your Checks (all mandatory)

      1. **Specificity** — Are contracts concrete? "System should work" → REJECT. "When input is empty list, returns empty dict" → PASS
      2. **Trivial satisfaction** — Could a no-op or stub function pass all contracts? If yes → REJECT. Every success-path contract MUST include observable output (stdout content, return value, side effect) beyond just an exit code.
      3. **Edge case coverage** — Do contracts cover: error handling, boundary conditions, empty inputs, malformed data, feature interactions? Missing → REJECT
      4. **Leakage** — Does behavioral.md name internal methods, class names, or implementation details from spec.md? If yes → REJECT. (You must read spec.md to detect what constitutes "internal details".)
      5. **Alignment** — Do behavioral contracts match what spec.md describes? Are there implementation paths in spec.md with no corresponding behavioral contract? Divergence → REJECT

      ## Project sub-checks (apply on top of the five canonical checks)

      These sub-checks generalize lessons accumulated across production pipeline runs. Each catches a class of contract weakness that the five canonical checks alone do not surface.

      ### 1a — Cross-layer identifier mapping
      Every identifier-shaped string that crosses a layer (HTTP wire ↔ application ↔ database; user-facing ↔ internal) MUST be pinned to its exact external-API field shape. Examples: UUID format (8-4-4-4-12 hex with hyphens); fixed-width identifiers padded to a documented length; canonicalization rules for case/whitespace; ISO-8601 timestamp precision (e.g. `\d{{3}}Z` rather than `.\d+Z` — the unescaped dot matches any character). If the behavioral contract says "session ID is a UUID" without pinning the exact shape, flag `[vague]` with the contract id.

      ### 1b — Stable diagnostic codes
      When a contract anchors on tool output (compiler errors, linter messages, test failures, HTTP error responses), the anchor MUST be on the STABLE error code (e.g. `TS2353`, `no-unused-vars`, SQLSTATE, HTTP status) — NOT on human-facing message prose. Message text drifts across tool versions; codes are part of the tool's public API. Flag `[vague]` if a contract anchors only on prose.

      ### 1c — Dev-mode instrumentation noise filter
      When asserting HTTP response body content for status-code markers, use canonical error-page phrases (`HTTP 500`, `Internal Server Error`, `Application error: a server-side exception`) — NOT bare digit substrings. Modern frameworks emit debug payloads with performance-timing numbers, hashes, and line numbers; a bare `500` false-positives on `performance.now()` timestamps and framework-emitted debug stream chunks. Flag `[vague]` when a contract matches a 3-digit HTTP code without anchoring context.

      ### 5a — Closed-union set-equality
      Any closed union the spec declares (error taxonomies, status enums, kind discriminators) MUST be covered set-equally in behavioral.md: every union member appears in at least one Given/When/Then contract. Count members in spec vs members covered in behavioral; flag `[missing_edge_case]` for any uncovered member. This generalizes the discriminated-union exhaustiveness check beyond TypeScript to any language.

      ### 5b — Deferred-as-ok discipline (acceptance-test concern, flagged here as smell)
      If the spec or behavioral leaks language like "we'll skip this in tests" or "this contract will be deferred" without naming the canonical `defer_contract` helper (or the language equivalent), flag `[trivial]`. A contract that is genuinely unverifiable at acceptance-time MUST be marked explicitly deferred via a dedicated counter — never silently counted as passing.

      ### 7d — Re-implementation of an existing symbol (spec-level smell)
      If the spec proposes authoring a new helper, loader, formatter, type, component, hook, or utility that duplicates an existing symbol in the codebase, flag `[divergence]`. The IMPLEMENT phase has its own 7d HARD RULE that returns BLOCKED on duplication; catching the proposal at SPEC stage saves a full pipeline round.

      **Sticky 7d enforcement (v4 — Phase-0 existing-symbols inventory; v4.2 verdict labels):** read `{output_dir}/existing_symbols.md` and cross-check every symbol the spec proposes against inventory sections 1-4 (UI primitives, shared libraries, adjacent actions/hooks, workspace barrels). The spec MUST assign exactly ONE of four verdicts per proposed symbol (per inventory §5):

      - **CONSUME** — Files-to-Modify cites the existing entry; no new symbol created. Cross-check: the import is concrete (named import; not a re-namespacing).
      - **EXTEND** (v4.2) — Files-to-Modify describes the parameterization (added arg / options object / safe-superset wrapper) of the existing symbol so it accommodates the new call site. Cross-check: Files-to-Create is empty for this concept; Implementation Steps names the new arg and how the existing call site (now also passing the same arg explicitly OR defaulting) stays byte-equivalent. EXTEND-without-Files-to-Create-empty is a `[divergence]` finding — if the spec ALSO creates a new symbol while claiming EXTEND, the verdict label doesn't match the spec content.
      - **DIVERGENT** — spec has a `## Divergence justification` subsection naming the existing symbol + the contract-required difference. Cross-check: justification is concrete (cites a sealed string / sort order / precision / type narrowing), not just "different use case".
      - **NEW-OK** — genuinely new; inventory §6 entry explicitly records "(none found)" with rationale.

      Any proposed-new symbol that overlaps with sections 1-4 WITHOUT one of the four explicit verdicts is `[divergence]` with the specific inventory-entry pointer. Verdict label mismatch (e.g. EXTEND claimed but Files-to-Create lists a new file) is `[divergence]` with `[verdict-mismatch]` qualifier.

      Search targets (adapt per project — these are the canonical scan paths): the project's UI primitive package(s); `lib/`, `utils/`, `_shared/` directories; sibling files in the same directory (across language extensions — `.ts`, `.js`, `.py`, `.go` — pick the relevant ones); cross-package symbols accessible via workspace boundaries.

      Note: if the SPEC_ADVERSARY phase does NOT have repo grep access (some daemons restrict adversary tooling), raise this as `[divergence]` to push the search responsibility to IMPLEMENT (which has 7d as a HARD RULE and MUST grep before authoring). The flag itself ensures the IMPLEMENT agent treats the proposed new symbol with extra scrutiny.

      Genuine divergence (different sort order, different precision, different sealed string) is NOT duplication — but the spec must call it out explicitly with a `## Divergence justification` subsection naming the existing symbol and the contract-required difference.

      ### 7e — Intra-symbol duplication audit (sticky enforcement, producer-side variant)

      7d (above) catches the CONSUMER-side smell: a new symbol that re-implements an EXISTING inventory entry (caller-enumeration audit). 7e catches the PRODUCER-side smell: a new symbol whose own body contains intra-PR byte-identical fragments.

      For every newly-created exported symbol the SPEC introduces (named in §B.3 Files-to-Create or §B.5 New symbols / appearing in inventory §6 with verdict EXTEND / DIVERGENT / NEW-OK), audit whether the SPEC's §B.4 Implementation Steps contain two or more steps that produce byte-identical sub-blocks (e.g. identical SQL projections, identical type assertions, identical destructuring patterns, identical guard clauses, identical RPC payload shapes) within the same symbol's body.

      If they do, the SPEC must either:

      - (a) factor the duplicate sub-block into a private helper named in §B.3 or §B.5 with its own divergence justification; OR
      - (b) document a divergence justification per branch in §B.5.x explaining why the byte-identical sub-blocks cannot share a helper (e.g. fixture short-circuit boundary; environment-gate branch; lazy-init guard; hot-path inlining requirement).

      The divergence justification under path (b) MUST meet the same concreteness bar as 7d's existing requirement: it MUST cite a sealed string, sort order, precision pin, type narrowing, environment-boundary discriminator, or hot-path performance constraint — NOT a bare "different use case" or "fixture vs production". A trivial hand-wave triggers `[divergence] F.X — intra-symbol duplication: §B.5.x justification is non-concrete (does not meet 7d concreteness criteria — sealed string / sort order / precision / type narrowing)` as a REQUEST_CHANGES finding even when the §B.5.x section header exists.

      Adversary finding format (REQUEST_CHANGES, one per duplicated sub-block):

        [divergence] F.X — intra-symbol duplication: §B.4 step N + step M produce byte-identical sub-block W within <new-symbol> without a shared-helper §B.5.x entry

      Where N, M are §B.4 step numbers; W is a one-line description of the duplicated sub-block; quote the duplicate verbatim under the finding line for evidentiary value.

      Empirical motivation: ToscanAI/value-investing#449 (lift commit `11db4eb`, 2026-05-25) shipped `findCompanyByTicker` with two byte-identical `await db<…>` SQL blocks separated by a fixture-stub short-circuit. The PR's 7d enumeration listed callers of a pre-existing symbol (`loadAnnualFactsFromDb`) and APPROVED — the new symbol's own intra-file duplication was never inspected. 7e closes this caller-enumeration blind spot at SPEC time, BEFORE acceptance tests are written. The downstream defense-in-depth layers (IMPLEMENT HARD RULE 7e-implement, IMPLEMENT HARD RULE §7.2 diff lint, REVIEW Sub-check 7d-producer) catch the same pattern at progressively later phases for robustness.

      ### 7f — Cross-package helper-name vigilance (added 2026-05-31 — post-Wave-8 dedup audit)

      When the spec proposes any new helper named with one of these prefixes — `format*`, `serialize*`, `parse*`, `assert*`, `to*`, `is*`, `get*`, `with*`, `make*`, `build*`, `materialise*`, `extract*`, `resolve*`, `validate*`, `send*`, `write*`, `load*` — grep the ENTIRE monorepo for an existing function with the IDENTICAL name (regardless of package). The 7d inventory is greenfield-scoped to the spec's proposed paths; 7f is the cross-package safety net. Surface as `[divergence]` even when the contracts genuinely differ — the name-collision risk alone justifies the flag. The IMPLEMENT phase will then either consume, rename, or document the genuine divergence.

      Lesson (post-Wave-8 audit 2026-05-31): a ToscanAI/value-investing audit found EDGAR + Yahoo ingestor packages each shipped their own `formatMessage` switch in sibling packages because each PR's SPEC author had no inventory entry to consult for the SIBLING package (Phase 0 inventory greenfield-scoped per-PR). Cross-package helper-name vigilance catches this BEFORE IMPLEMENT.

      ## Output Format

      Your response MUST start with one of these on the very first line:
      - `APPROVE` — all contracts are tight enough to write meaningful acceptance tests
      - `REQUEST_CHANGES` — one or more weaknesses found

      For REQUEST_CHANGES, list findings using this format (one per line):
        [category] description of the weakness

      Where category is one of: vague, trivial, missing_edge_case, leakage, divergence

      Example:
        REQUEST_CHANGES
        [vague] "The system handles errors gracefully" — no observable outcome specified
        [trivial] CLI success contract only checks exit code 0 — a stub that exits 0 passes without executing anything
        [missing_edge_case] No contract covers what happens when flags --foo and --bar conflict
        [leakage] Behavioral contract references "_parse_verdict" which is an internal method in spec.md
        [divergence] spec.md describes an MCP return format but behavioral.md has no contract for it

      If APPROVE: write only APPROVE (optionally followed by brief rationale).
      Write your full adversary review to {output_dir}/spec_adversary.md

  # Phase 1d: Spec Postmortem (runs only on exhausted)
  - id: postmortem_spec
    name: "Spec Exhaustion Postmortem"
    description: "When the spec loop exhausts iterations without agreement, extract unresolved findings and propose issue improvements for the next attempt."
    model_tier: sonnet
    thinking_level: medium
    transitions: {}
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the POSTMORTEM phase. The spec loop exhausted its iteration limit without the adversary approving. Extract unresolved findings and propose exact issue body improvements. [/PIPELINE CONTEXT]

      You are a technical analyst performing a postmortem on a failed spec review cycle.

      ## Pipeline Context
      **Issue:** {config[issue_title]} (#{config[issue_number]})
      **Repository:** {config[repo_path]}
      **What happened:** The spec, behavioral, and adversary agents went through multiple rounds without agreement.

      ## Current Files
      Read the latest implementation spec at: {output_dir}/spec.md
      Read the latest behavioral contracts at: {output_dir}/behavioral.md
      Read the latest adversary review at: {output_dir}/spec_adversary.md

      ## Round History
      Read ALL round files from {output_dir}/ to understand the full evolution:
      - spec_round1.md, behavioral_round1.md, spec_adversary_round1.md, etc.

      ## Your Task

      1. **Identify persistent findings** — Which adversary findings appeared in multiple rounds and were never resolved?
      2. **Root cause analysis** — For each, explain WHY it persisted:
         - Architectural contradiction in the issue body?
         - Missing domain knowledge?
         - Spec agent and behavioral agent talking past each other?
         - Design decision the agents cannot make without human input?
      3. **Proposed issue improvements** — For each persistent finding, write the EXACT text to add/change in the GitHub issue body.

      Write your full postmortem to {output_dir}/postmortem_spec.md

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # IMPLEMENTATION PHASES (unchanged from v1.6)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # Phase 2: Behavioral Acceptance Tests
  - id: acceptance_test
    name: "Behavioral Acceptance Tests"
    description: "Write behavioral tests from contracts ONLY — never from implementation. These become immutable constraints for the implementing agent. Behavioral contracts have been adversarially reviewed before reaching this phase. Test format switches on {config[language]}: pytest (Python), jest (TypeScript/JavaScript), `go test` (Go), or bash verify-script (bash)."
    model_tier: sonnet
    thinking_level: high
    transitions:
      success: test_adversary
      failed: acceptance_test
      timeout: acceptance_test
    protected_outputs:
      # Paths relative to {output_dir} unless prefixed with the repo path placeholder.
      - acceptance_tests.py            # Python (pytest)
      - acceptance_tests.js            # TypeScript/JavaScript (jest, transpiled or vanilla JS)
      - acceptance_tests.ts            # TypeScript (jest with ts-jest, or vitest)
      - acceptance_tests_test.go       # Go (go test)
      # Bash verify-scripts live in the repo, NOT the run output dir.
      - "{config[repo_path]}/scripts/verify-*.sh"
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the ACCEPTANCE_TEST phase. Write tests from behavioral contracts only. You have NO access to implementation details — this is by design. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a QA engineer writing behavioral acceptance tests from a spec.
      You have NOT seen any implementation — you are writing tests BEFORE the code exists.

      ## GROUND TRUTH — The Issue These Tests Must Verify
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The acceptance tests you write must verify the feature in the issue above. Before writing tests, read `behavioral.md` and verify it describes THIS issue. If `behavioral.md` describes a different system, project, or feature (e.g. a CLI tool when the issue is about a UI component), write a single failing test named `test_BLOCKED_behavioral_topic_mismatch` whose body calls `pytest.fail()` with the message `behavioral.md describes <other topic> instead of issue '<issue title>' — pipeline must restart with corrected behavioral contracts`. Do not write any other tests.

      Do NOT invent tests for features that are not in the issue above. Every test must trace back to a specific contract in `behavioral.md`.

      ## Previous Work
      {phase_summary}

      Read the behavioral contracts at: {output_dir}/behavioral.md
      This file contains ONLY the behavioral contracts — what the system should do.
      You have no access to implementation details. This is by design.

      ## Task

      Test format depends on `{config[language]}`:

      ### Python — write `{output_dir}/acceptance_tests.py`
      - Contains pytest tests expressing behavioral contracts of the form: "when I call X with Y, it produces Z"
      - Tests use `pytest` and standard Python imports only
      - Add `sys.path.insert(0, '{config[repo_path]}')` or `sys.path.insert(0, str(Path('{config[repo_path]}').parent))` at the top
      - Aim for 5-15 focused behavioral tests

      ### TypeScript / JavaScript — write `{output_dir}/acceptance_tests.js` (or `.ts`)
      - Contains jest tests (`describe`/`it`/`expect`)
      - Add `import {{ ... }} from '{config[repo_path]}/...'` resolving to the production code paths (when writing the file, un-escape `{{`/`}}` to single `{{`-character / single `}}`-character — the brace-doubling is a Python-format escape required by this prompt template)
      - Aim for 5-15 focused behavioral tests

      ### Go — write `{output_dir}/acceptance_tests_test.go`
      - Contains `func TestXxx(t *testing.T)` tests
      - Tests import the production package by path
      - Aim for 5-15 focused behavioral tests

      ### Bash (verify-script — project deviation, used when behavioral contracts span shell-orchestrated workflows: real-DB integration, CLI dev-server harnesses, multi-package build gates)

      Write `{config[repo_path]}/scripts/verify-<issue>.sh` where `<issue>` is a slug derived from `{config[issue_number]}` (or `{config[issue_title]}` if your project prefers a kebab-case slug). Common shapes: plain integer (`verify-123.sh`), JIRA-style (`verify-PROJ-123.sh`), or epic-tagged (`verify-EPIC-NN-MM.sh`). The script:

      - Uses `set -uo pipefail` (NOT `set -e` — see sub-check 2a in the TEST_ADVERSARY prompt for why)
      - Uses the `if VAR=$(cmd); then ...; else ...; fi` form (NOT `var=$(cmd); if [ "$?" -eq 0 ]; ...` which crashes silently under `set -e`)
      - **Single-quoted grep patterns** to disable shell expansion of regex metacharacters (`grep '^foo\\.bar$' file`, NOT `grep "^foo\\.bar$" file`)
      - **Pipefail-safe count**: `grep -c <pattern> <file> || true` to neutralize pipefail's exit-1 on zero match (otherwise the script aborts at the first probe that matches zero lines, which is often a legitimate "no errors" state)
      - Probe directories under `{config[repo_path]}/.verify-<issue>-probe/` (NOT bare `/tmp` — `tsc moduleResolution: "bundler"` needs hoisted node_modules)
      - EXIT-trap cleanup that reaps process groups (`kill -- -$PGID`) + removes probe directories + leaves ports free
      - Per-probe tsconfigs with `"files": ["<probe>"]` (NOT `--project tsconfig.json <file>` — the latter emits TS5042 instead of TS2322/TS2353)
      - Numbered sections (§0, §1, ..., §seal) with a header comment block mapping each section to the behavioral contracts it covers
      - Helpers: `ok "<msg>"` / `bad "<msg>"` / `note "<msg>"` increment counters (passes/fails/notes) AFTER the test result is known (NEVER inside `$(...)` substitution — exit code gets swallowed)
      - **`defer_contract` helper** (REQUIRED — see canonical body below): for contracts genuinely unverifiable at script-run time (live network, runtime-only DB state, fixture machinery not yet wired). NEVER use `ok "...DEFERRED..."` — that inflates the pass counter (sub-check 5b anti-pattern).
      - Final summary regex: `^✓ PASS — [0-9]+ passed / [0-9]+ failed / [0-9]+ deferred` on success; `^✗ FAIL — ...` on failure. Exit 0 iff failed == 0.

      Canonical helper bodies (brace-escaped for the Python-format prompt renderer; the agent MUST un-escape `{{`/`}}` to single-brace characters when writing to the file — the doubling is a Python-format escape required by this prompt template):

      ```bash
      # `ok` / `bad` / `note` helpers — visible per-check output with counter increment.
      ok()   {{ printf '  \033[32m✓\033[0m %s\n' "$*"; passes=$((passes + 1)); }}
      bad()  {{ printf '  \033[31m✗\033[0m %s\n' "$*"; fails=$((fails + 1)); }}
      note() {{ printf '  \033[33m•\033[0m %s\n' "$*"; notes=$((notes + 1)); }}

      # `defer_contract` — explicit deferral; NOT counted as ok, NOT counted as fail.
      defer_contract() {{
          local contract_id="$1"
          local reason="$2"
          printf '  \033[33m⊘\033[0m %s — DEFERRED: %s\n' "$contract_id" "$reason"
          deferred=$((deferred + 1))
          deferred_list+=("$contract_id")
      }}

      # `count_matches_fixed` — grep -cF (fixed-string), pipefail-safe. <file> is RELATIVE to $ROOT (helper prepends).
      count_matches_fixed() {{
          local pattern="$1"
          local file="$2"
          if [ ! -f "$ROOT/$file" ]; then echo 0; return 0; fi
          local n
          n=$( (grep -cF -- "$pattern" "$ROOT/$file" 2>/dev/null) || true)
          echo "${{n:-0}}"
      }}

      # `count_matches_re` — grep -cE (extended regex), pipefail-safe. <file> is RELATIVE to $ROOT.
      count_matches_re() {{
          local pattern="$1"
          local file="$2"
          if [ ! -f "$ROOT/$file" ]; then echo 0; return 0; fi
          local n
          n=$( (grep -cE -- "$pattern" "$ROOT/$file" 2>/dev/null) || true)
          echo "${{n:-0}}"
      }}

      # `file_sha256` — pipefail-safe sha256 of a file, or 'missing' if absent.
      file_sha256() {{
          local file="$1"
          if [ ! -f "$file" ]; then echo 'missing'; return 0; fi
          sha256sum "$file" | awk '{{print $1}}'
      }}
      ```

      Companion init at the top of the script: `deferred=0` and `deferred_list=()` alongside `passes=0` `fails=0`.

      Canonical seal banner (§1 — printed at runtime, NOT hardcoded-checked — the sha256 is recorded in the Phase-2c SEAL commit body; un-escape `{{...}}` to single-brace `...` when writing the file):

      ```bash
      SELF_SHA=$(sha256sum "$ROOT/scripts/verify-<issue>.sh" | awk '{{print $1}}')
      printf '  sha256: %s = %s\n' "scripts/verify-<issue>.sh" "$SELF_SHA"
      ```

      Aim for as many sections as the behavioral contracts require; common per-issue range is 8-18 sections. Every contract in `behavioral.md` MUST either be covered by a positive `ok`/`bad` assertion OR marked via `defer_contract <id> "<reason>"`. The orchestrator's PASS gate (Phase 7 ACCEPTANCE) verifies the contract count in behavioral.md matches (passes + deferred) in script output.

      ## Existing-symbols inventory (Phase 0 sticky reference — sub-check 7d gate)

      Read `{output_dir}/existing_symbols.md` and behavioral.md. For every CANONICAL existing symbol named in behavioral contracts (citing inventory §1-4), the acceptance test MUST include an import-path assertion verifying the IMPLEMENT phase will CONSUME the existing symbol rather than re-author it. Examples:

      - If behavioral contract says "uses `Dialog` from `packages/ui/src/components/dialog.tsx`", the verify-script asserts: `count_matches_re "import.*\bDialog\b.*from .*@<scope>/ui" "<impl-file>" -ge 1`.
      - If a SPEC-proposed-new symbol in inventory §6 cites a divergence justification, the verify-script asserts the new symbol IS authored at the proposed path (the new symbol's file existence).
      - If both an existing AND a new equivalent are expected (one consumed, one authored), pin BOTH assertions.

      This makes the 7d sub-check enforced AT GATE TIME — an IMPL that rebuilds a primitive listed in inventory §1-4 fails the verify-script before REVIEWER sees the diff.

      ## Common rules for all languages

      - Tests are derived ONLY from behavioral.md — do not assume implementation details
      - DO NOT test for specific method names, private functions, or class internals
      - DO NOT test that a specific function exists — test that a BEHAVIOR works
      - ❌ Wrong: "assert hasattr(obj, '_extract_code_quality')"
      - ✅ Right: "assert scorer.compute(with_quality_data) > scorer.compute(without_quality_data)"
      - Each test (or numbered bash section) has a clear comment/docstring stating the behavioral contract it covers
      - Cover: happy path, edge cases, error cases, boundary conditions
      - Public contract surface (HTTP routes, action signatures, exact rendered strings, closed-union members) IS the contract and IS testable; private helper names are leakage

      ## Revision-round (when TEST_ADVERSARY returns REQUEST_CHANGES)

      If a prior acceptance test artefact exists at the language-appropriate path AND the `{iteration_history}` shows a prior TEST_ADVERSARY round with REQUEST_CHANGES findings, you are in REVISION ROUND. Apply SURGICAL edits to the existing file — do not rewrite from scratch. Tests the adversary did NOT flag MUST remain byte-identical. Address ONLY the flagged findings:

      1. Read the existing acceptance test artefact at the language-appropriate path.
      2. Read the adversary's findings from `{output_dir}/test_adversary.md` (the most recent round overwrites prior rounds; only the current findings remain).
      3. Apply targeted fixes per finding category: `[vague]` → tighten anchor (e.g. anchor on diagnostic code, not message prose); `[trivial]` → strengthen assertion (e.g. `=== 5` not `<= 5`); `[missing_edge_case]` → add a new test/probe for the gap; `[leakage]` → remove the internal-helper reference and replace with observable; `[divergence]` → align with behavioral.md.
      4. A full rewrite wastes tokens AND loses adversary-approved content. Surgical edits only.

      ## Initialize acceptance results

      Write `{output_dir}/acceptance_results.json`:
         ```json
         {{
           "phase": "acceptance_test",
           "status": "tests_written",
           "test_file": "<language-appropriate path: acceptance_tests.py | acceptance_tests.js | acceptance_tests.ts | acceptance_tests_test.go | scripts/verify-{config[issue_number]}.sh>",
           "passed": 0,
           "failed": 0,
           "errors": 0,
           "total": 0,
           "pass_rate": 0.0,
           "note": "Tests written pre-implementation. Run after implement phase."
         }}
         ```

      ## Output
      Write a summary to {output_dir}/acceptance_test.md:
      - List of behavioral contracts (one per test)
      - Rationale for each contract (what aspect of the spec it validates)
      - Any ambiguities in the spec that required assumptions

  # Phase 2c: Test Adversary (project deviation from canonical orchemist)
  #
  # This phase reviews the acceptance test artifact (Python pytest, JS jest,
  # Go test files, or bash verify script) for structural weaknesses BEFORE
  # the test is sealed and the implementation phase begins. The orchemist
  # canonical pipeline trusts pytest as structurally sound; this is correct
  # for Python projects. Bash verify scripts have more surface for structural
  # mistakes (heredoc parse errors, quote-aware bugs, third-party schema
  # drift, path-math defects, broken grep anchors) — hence this added loop.
  #
  # Static review here does NOT catch RUNTIME bugs in the test — those
  # surface in Phase 3 (IMPLEMENT) as BLOCKED reports routed back via
  # seal-break. This phase is for STRUCTURAL weaknesses only.
  #
  # On APPROVE, the orchestrator MUST seal the acceptance artifact:
  #   1. Stage the acceptance test file
  #   2. Commit with message `chore(#N): seal <acceptance-file> — Phase 2c SEAL`
  #   3. Record the file's sha256 in the commit body
  # The IMPLEMENT phase reads the sealed sha256 and any drift triggers a
  # BLOCKED → narrow re-review → audit-locked re-seal cycle (see HARD RULE
  # — Inverse silent test amendment in the IMPLEMENT phase).
  - id: test_adversary
    name: "Acceptance Test Adversary Review"
    description: "Adversarially review the acceptance test artifact for structural weaknesses — over-loose regex, trivial-satisfaction gates, missing edge-case probes, internal-implementation leakage, broken anchor patterns. Applies the canonical 5-check rubric plus project sub-checks adapted for bash/jest/pytest specifics. Loop cap 4."
    model_tier: opus
    thinking_level: high
    max_iterations: 4
    transitions:
      approve: implement
      request_changes: acceptance_test
      exhausted: postmortem_review
      failed: test_adversary
      timeout: test_adversary
      success: test_adversary  # fallback: verdict extraction failure, loop conservatively
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the TEST_ADVERSARY phase (round N/4) for issue #{config[issue_number]} of {config[repo_url]}. Your verdict determines whether the acceptance test in `{output_dir}/acceptance_tests.<ext>` (or `scripts/verify-<issue>.sh` for bash) is tight enough to gate the implementation. Behavioral contracts have already been approved in Phase 1c. You are reviewing the test translation of those contracts. Do not ask questions or send messages. Do not modify any files. Do not run the test. [/PIPELINE CONTEXT]

      You are an adversarial acceptance-test reviewer. Apply the canonical orchemist spec_adversary rubric adapted for the acceptance-test artifact.

      ## GROUND TRUTH — The Issue These Tests Must Verify
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      ## Behavioral contracts (approved in Phase 1c)
      Read: {output_dir}/behavioral.md

      ## Previous Work / Prior Rounds
      {phase_summary}

      {iteration_history}

      ## Read
      Read the acceptance test file at: `{output_dir}/acceptance_tests.py` (Python) OR `{output_dir}/acceptance_tests.js` (TS/JS) OR `{output_dir}/acceptance_tests_test.go` (Go) OR `{config[repo_path]}/scripts/verify-<issue>.sh` (bash) — switch on {config[language]}.

      For bash verify scripts, also note the script's SHA256 (`sha256sum scripts/verify-<issue>.sh`) for transparency only — the canonical SEAL sha256 is generated AFTER your APPROVE by the orchestrator's Phase-2c SEAL commit; you are reviewing the PRE-SEAL state and your computed sha will not equal the sealed sha. Do NOT pin or record this transient sha as if it were the seal value.

      ## Your Six Mandatory Checks (canonical 5 + project deviation #6)

      1. **Specificity** — exact error codes; concrete grep patterns; no "reasonable budget" without a numeric cap.

         **1b — Stable diagnostic codes (project sub-check):** when an acceptance probe regex-matches tool output (tsc, eslint, pytest, jq), anchor on the STABLE error code (`TS2353`, `no-unused-vars`, `test-id`, SQLSTATE) rather than human-facing message prose. Message text drifts across tool versions; codes are part of the tool's public API. Flag as `[vague]` if the only match is against prose.

         **1c — Dev-mode instrumentation noise filter (project sub-check):** when asserting HTTP response body content for status-code markers, use canonical error-page phrases (`HTTP 500`, `Internal Server Error`, `Application error: a server-side exception`) NOT bare digit substrings. Dev-mode frameworks emit debug payloads with performance-timing numbers, hashes, and line numbers; a bare `500` false-positives on `performance.now()` timestamps and other framework-emitted debug streams. Flag as `[vague]` when a grep matches a 3-digit HTTP code without anchoring context.

         **1d — TS `as` cast bypass in reject probes (project sub-check):** in TypeScript reject probes (code that demonstrates rejection of an invalid literal — TS2322 / TS2339 / TS2353 / etc.), the load-bearing literal MUST NOT be wrapped in an `as` type assertion. `as` collapses the literal to the asserted type at the cast site, so an incompatible value silently widens and the probe passes without proving anything. Canonical fix: typed `const` LHS with direct literal assignment, OR `satisfies` for narrowing without assertion. Flag as `[trivial]` with the file:line of the `as` cast.

      2. **Trivial satisfaction** — could a stub or no-op pass each section? Probe hard: does the test actually exercise the behaviour, or just file existence / status code / loose regex?

         **2a — Bash `set -euo pipefail` gotcha (project sub-check, bash-specific):** if the script uses `set -euo pipefail`, scan for the pattern `var=$(cmd-that-can-exit-nonzero); if [ "$?" -eq 0 ]; then ok; else bad; fi`. This crashes the script silently — bash exits at the assignment BEFORE the `if` runs, `bad` never prints, fail counter never increments, `set -e` propagates out. The commonly-believed "assignments mask set -e" rule does NOT apply to this specific pattern. Canonical fix: `if var=$(cmd); then ok; else bad; fi` (if-as-command form) OR `set +e` / capture `rc=$?` / `set -e` wrap. Flag as `[trivial]` with the fix pattern.

         **2b — Unquoted variable in nested heredocs (project sub-check, bash-specific):** scan multi-level `$(... | python3 <<PY ... $VAR ... PY)` patterns for unquoted bash variable expansions INSIDE the python (or similar) heredoc. If the variable contains spaces, JSON content, or word-like tokens, bash may interpret the expansion as a command when the heredoc is re-parsed. Surfaces at runtime as "command not found" with clean `bash -n`. Prefer `os.environ.get(...)` + `ENV_VAR="$var"` prefix for bash→python passing.

         **2c — Async-indexer stability wait (project sub-check):** when a §N captures a pre/post delta against an eventually-consistent backing store (event queues, queue-count metrics, search indices, replication-lag), the baseline MUST be stable before the probe runs. Pattern: poll the count until two successive reads match (bounded by timeout). Flag as `[missing_edge_case]` when a §N probe reads `count` once, emits, sleeps, reads `count` again, and asserts `delta == N` without a stability wait — prior-section events that finish indexing during the probe are misattributed.

      3. **Edge case coverage** — port hygiene preflight; liveness checks inside poll loops; max-wait on all polls; cleanup trap reaps process group; probe-dir removal in cleanup.

      4. **Leakage** — test asserts specific function names, class names, or module paths instead of observable behaviour. Public contract surface (HTTP routes, action signatures, exact rendered strings) IS the contract and is NOT leakage; private helper names are.

      5. **Alignment** — every behavioral contract has ≥1 assertion; no assertions for behaviours outside the issue.

         **5a — Closed-union set-equality (project sub-check):** for each closed union the behavioral contracts declare (error taxonomies, status enums, kind discriminators), enumerate the union members and verify the acceptance test exercises every one. Flag `[missing_edge_case]` for any uncovered member.

         **5b — Deferred-as-ok inflation (project sub-check, acceptance-test specific):** scan for any `ok ".*DEFERRED.*"`, `ok ".*PENDING.*"`, or `ok ".*SKIPPED.*"` lines (or the language equivalent — pytest `@pytest.mark.xfail(strict=False)`, jest `it.skip`). The `ok` helper increments the pass counter, so a contract that was NOT exercised at script-run time gets counted as exercised. Canonical fix: a `defer_contract` helper with a separate `deferred` counter and a summary section listing every deferred contract id. Flag `[trivial]` with the file:line.

      6. **Cross-section state simulation (project sub-check, multi-step specific)** — walk the test steps in order (numbered §-sections in a bash verify-script; `beforeEach` chains + ordered `it` blocks in jest; pytest fixtures with session scope; Go subtest ordering), tracking per-test-entity cumulative state: rate-limit slots consumed, DB rows created/deleted/updated, session cookies captured/invalidated, seeded entity states. For each step's probe, verify its preconditions are SATISFIED by the accumulated state from prior steps. Flag `[missing_edge_case]` when a §N (or `it` block N) asserts "user X emits event Y" while §M (M<N) exhausted X's quota — structurally impossible, but individual steps each look fine in isolation. The bash framing applies most directly to verify-scripts; equivalent state-tracking applies in any multi-step test framework.

      ### 7d — Sticky existing-symbols cross-check (project sub-check, v4 Phase-0 inventory)
      Read `{output_dir}/existing_symbols.md` (Phase-0 sticky inventory). For every CANONICAL existing symbol named in behavioral contracts (inventory §1-4), verify the acceptance test artefact contains an assertion that the IMPLEMENT phase will CONSUME the symbol — typical assertions: an import-path grep (`count_matches_re "import.*\bDialogPrimitive\b.*from .*@<scope>/ui/dialog" "<impl-file>"`), OR a runtime probe that exercises the consumed component via RTL/jest, OR a file-existence assert that the IMPL did NOT add a competing primitive file. If a behavioral contract names a canonical existing symbol but the verify-script does NOT assert consumption, flag `[missing_edge_case]` with `inventory-entry: <symbol> at <path:line>; verify-script lacks consume-assertion`. This makes the 7d sub-check enforced AT GATE TIME — an IMPL that rebuilds a primitive listed in inventory §1-4 fails the verify-script before REVIEWER sees the diff (sticky persistence).

      ## Prior-cycle lessons the test MUST respect

      - Probe directories inside the repo root (NOT bare `/tmp`) — language-tooling like `tsc moduleResolution: "bundler"` needs hoisted node_modules.
      - Heredoc `|| VAR=""` patterns OUTSIDE `$(...)` command substitution — bash 5.2 parse error otherwise.
      - No `@ts-expect-error` in negative TS probes — it suppresses the diagnostic we want to catch.
      - JSON payloads in `curl -d` use `\\"` (two backslashes) so the sent JSON has proper `\"` escaping.

      ## Output Format

      Line 1: `APPROVE` or `REQUEST_CHANGES` (no preamble).

      For REQUEST_CHANGES, one finding per line:

        [category] description with concrete pointer (file:line or §-header)

      where category is one of: vague, trivial, missing_edge_case, leakage, divergence.

      If APPROVE: write `APPROVE` followed by 1-2 sentences confirming the test artifact is structurally sound.

      Write your full adversary review to `{output_dir}/test_adversary.md` (overwrite any prior round file with the current round's content).

      Iteration cap: 4. If R4 returns REQUEST_CHANGES, stop and escalate — the test artifact's structural defects are unresolvable in the bounded loop.

  # Phase 3: Implementation
  - id: implement
    name: "Implementation"
    description: "Write the code changes based on the spec, constrained by acceptance tests"
    model_tier: sonnet
    thinking_level: high
    max_iterations: 3
    transitions:
      success: acceptance_run
      failed: implement
      timeout: implement
      timeout: implement
      exhausted: postmortem_review
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the IMPLEMENT phase. Your output feeds the review phase — not a human. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a developer implementing changes based on a spec.

      ## IMMUTABLE CONSTRAINT — READ THIS FIRST
      The acceptance test artefact (path resolves per `{config[language]}` per the table in the "Read the acceptance tests" line of the Task section below) was written BEFORE your implementation by a separate agent AND adversarially reviewed in Phase 2c TEST_ADVERSARY. It represents the behavioral contract of this feature.

      You MUST make the acceptance assertions pass. You MUST NOT modify, delete, or work around the acceptance artefact under any path you take through this phase. For bash verify-scripts, the artefact's sha256 is recorded in the Phase-2c SEAL commit body and MUST remain byte-stable for the duration of IMPLEMENT — any apparent defect is a candidate for SEAL BROKEN via the canonical narrow-re-review audit-locked cycle (orchestrator-driven, NOT IMPL-driven). The pass rate of the acceptance assertions is the primary quality signal for this pipeline run.

      ## GROUND TRUTH — The Issue You Are Implementing
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The code you write must implement the feature in the issue above. Before writing any code, read `spec.md` and `acceptance_tests.py` and verify they describe THIS issue. If `spec.md` describes a different system, project, or feature (e.g. a CLI tool when the issue is about a UI component), STOP — write `BLOCKED: spec mismatch — spec.md describes <other topic> instead of issue '<issue title>'` to `{output_dir}/implement.md` and do NOT modify any files in the repository or create any commits.

      Do NOT invent functionality that is not in the issue above. The issue body is the source of truth for what this feature does — if `spec.md` is missing detail, fall back to the issue body, never to your own assumptions.

      ## HARD RULES (return BLOCKED rather than violate any of these)

      **BLOCKED contract (applies to every rule below):** when you raise BLOCKED for ANY of these rules, write the report to `{output_dir}/implement.md` with FIRST LINE = `BLOCKED: <category> — <one-line summary>`, then add 1-3 paragraphs explaining the violation, the disallowed path you considered, and the recommended audit-locked recovery. STOP. Do NOT modify any files in the repository, do NOT create commits, do NOT push. The orchestrator routes the BLOCKED report to the appropriate narrow re-review.

      **BLOCKED is legitimate whether discovered at first read OR during impl** — the protocol does not require attempting impl before raising it. If you read the sealed acceptance artefact and spot a defect immediately, return BLOCKED without writing any code.

      ### HARD RULE — BLOCKED not accommodate

      If satisfying a sealed acceptance assertion would require adding a wrapper, shim package, synthetic log line, entrypoint override, or any new bootstrap file BEYOND what the issue body describes as deliverables, STOP. Do not add the workaround. Test-accommodation workarounds ship as design debt that costs entire follow-up pipelines to rip out. Instead return a BLOCKED report:

        BLOCKED: test §N may be over-literal; observing <contract> requires <workaround>; recommend acceptance-test amendment.

      Write this report to {output_dir}/implement.md and STOP. The orchestrator routes BLOCKED to a narrow acceptance-test review rather than papering over the issue in the code.

      ### HARD RULE — Inverse silent test amendment (bidirectional)

      The BLOCKED escape is BIDIRECTIONAL. Beyond "growing implementation to satisfy over-literal test", you MUST also stop and return BLOCKED when implementation reveals that a sealed test assert, behavioral pin, or numeric tolerance is mathematically/structurally WRONG for the doctrine implementation:

      - Do NOT widen tolerances inline (`<= 10` → `<= 11`) to absorb real doctrine drift.
      - Do NOT change strict-equality pins (`=== 6.25` → `=== 0`) inline even when the new value is mathematically correct.
      - Do NOT amend `behavioral.md`/`spec.md` inline to match implementation reality.
      - Do NOT modify the sealed acceptance file inline from the IMPLEMENT phase. Modifications are permitted only via the orchestrator-driven audit-locked seal-break cycle (SEAL BROKEN commit → narrow re-review APPROVE → re-seal commit on a separate branch state, NOT bundled into the impl commit) — see the seal-break protocol documented in TEST_ADVERSARY's success-transition.

      Report instead:

        BLOCKED: §N's pin <X> is mathematically incorrect for input <shape>; doctrine implementation produces <Y>; recommend acceptance-test amendment to <new pin>.

      Both directions share one purpose: the **audit lock** (narrow re-review of the delta) is what legitimizes any movement of a sealed pin. Silent amendment makes the seal stale-on-claim — the seal still exists, but documents fiction. The IMPLEMENT mandate does not include "amend the contract on the fly," even when the amendment is mathematically necessary.

      ### HARD RULE — TS `as` cast bypass in reject probes (sub-check 1d)

      If a sealed acceptance §N is a TS reject probe (asserts that `tsc` emits a specific diagnostic on an invalid literal), you MUST NOT introduce an `as` type assertion on the load-bearing literal to make compilation work. `as` collapses the literal to the asserted type at the cast site, so the probe silently passes without proving rejection. Canonical fix: typed `const` LHS with direct literal assignment, OR `satisfies` for narrowing without assertion. If your only path to green is via an `as` cast, return BLOCKED — that is a test bug, not an implementation gap.

      ### HARD RULE — Production-code-for-test-convenience (sub-check 7a)

      The following IMPLEMENT-introduced production-code modifications are DISALLOWED when their sole purpose is to satisfy a sealed verify assertion:

      1. **Test-only database migration** — a migration whose only consumer is a verify-script query (a column rename so a §N grep matches; an alias view; a CHECK-constraint relaxation that the production model never needs). Verify-query mismatches are test bugs, not migrations.
      2. **Test-only env-var knob** — `process.env.X` reads (or equivalents in other languages) whose only effect is to alter test-environment behavior (idle timeouts, retry counts, log-format toggles, shutdown grace). Production code should not grow knobs production never sets.
      3. **Test-only NODE_ENV (or equivalent) branching** — `if (process.env.NODE_ENV === "test") {{ ... }}` branches in production modules that return different shapes for tests (un-escape `{{`/`}}` to single brace characters when writing the file; the doubling is a Python-format escape required by this prompt template). Production code should be uniform; tests should observe production behavior, not a different code path.

      If your only path to green is one of these patterns, return BLOCKED with the disallowed pattern name. The orchestrator (or REVIEWER) intervenes if the production behavior is correct and the script's assertion is wrong.

      ### HARD RULE — Re-implementation of existing symbol (sub-check 7d)

      **FIRST read `{output_dir}/existing_symbols.md`** (Phase-0 sticky inventory). Sections 1-4 enumerate UI primitives, shared libraries, adjacent action/hook patterns, and workspace barrels in this project. Section 5 is the consume-vs-author guidance. Section 6 lists the SPEC-proposed new symbols. Cross-check every new symbol you're about to author against the inventory BEFORE grepping the repo. If the inventory has an exact-match entry: consume (preferred) OR return BLOCKED per the consume-vs-author guidance.

      For symbols NOT in the inventory (or if the inventory has empty sections because the consumer didn't provide grep paths), fall back to ad-hoc grep: scan sibling `*-data.ts`, `_loaders/`, `__tests__/`, `e2e/`, `packages/*/src/`, `lib/`, `utils/`, AND project UI primitive packages (e.g. `@<scope>/ui`, `<repo>/components/ui/`). If a byte-identical or near-identical implementation already exists:

      1. **Consume or extend it** (no BLOCKED needed) — import the existing symbol, or parametrise it (add an options arg) so both call sites share one source. When variants diverge, adopt the *safe superset* (e.g. a try/catch wrapper) — never silently narrow behaviour. Consume-and-extend is the GREEN path; proceed inline.
      2. If consuming is impossible WITHOUT a shared module the spec did not anticipate (no `_shared/`, cross-package boundary, existing copy is test-scope but you need prod-scope), STOP and return BLOCKED:

           BLOCKED: 7d-duplication — <symbol> duplicates <existing path:line>; consolidating needs <shared module> not in the spec; recommend spec amendment.

         Do NOT copy-paste "to consolidate later." A copy carrying a `// Mirrors <other file> verbatim` comment is the exact anti-pattern this rule exists to stop.

      **7d UI-primitive widening:** when authoring React/Vue/Svelte components, hooks, or browser-side helpers, the grep MUST include the project's UI primitive package(s) (Dialog, Badge, Alert, Popover, Toast, Skeleton, etc.) AND the project's `lib/` / `utils/` directories (date/time formatters, debounce hooks, browser-event listeners). Reinventing a primitive that already exists in the shared UI package is the same sub-check 7d violation as reimplementing a backend symbol. Also: a helper named identically to an existing project helper (e.g. two `formatRelativeTime` functions in different files) is a name-collision risk even when the contracts genuinely differ — rename the new one or parametrise the existing one.

      **7d intra-phase peer collision (added 2026-05-31 — post-Wave-8 dedup audit):** sub-check 7d's normal grep checks the EXISTING repo state at the start of IMPLEMENT. But when the spec proposes authoring MULTIPLE new files in ONE pipeline run (e.g. 7 components in a portfolio dashboard, 3 sibling test routes, paired error+success serializers), the second/third/Nth file is blind to the just-authored peers in the same phase. AFTER writing each new file and BEFORE writing the NEXT new file, grep the SUM of (already-authored peers in this phase + existing repo) for symbol-name collisions on the next file's planned exports. If a collision exists, consume the just-authored peer or refactor BOTH to share a helper. This catches the multi-file-PR antipattern: 7 portfolio components each with their own `formatMoney/formatPct/formatDecimal` triplet shipped in one PR because each component file was authored in isolation. The intra-phase peer-check moves the catch from REVIEW (where it accumulates as debt) to IMPLEMENT (where it consolidates inline at near-zero cost).

      Genuine divergence is NOT duplication: if the near-copy has a real contract-required difference (Ascending vs Descending sort, 1-dp vs 2-dp format), keep it separate AND document why in a leading comment. This rule targets accidental copy-paste, not intentional twins.

      ### HARD RULE — Intra-symbol self-check before file output (sub-check 7e-implement)

      7d (above) catches CONSUMER-side smell: a new symbol that re-implements an EXISTING inventory entry. 7e-implement catches PRODUCER-side smell at AUTHORING time: a new symbol whose own body is about to be written with byte-identical arms.

      Before writing any new file containing a newly-created exported function or method, inspect each `return` / `throw` arm of the function and verify that no two arms are byte-identical modulo whitespace. The check applies symmetrically across language syntaxes: Python `return` / `raise`, JS/TS `return` / `throw`, Go `return`, Rust `Ok(...)` / `Err(...)` arms, bash function `echo` + `exit` arms at the function level. "Byte-identical modulo whitespace" means: strip leading/trailing whitespace, collapse internal whitespace runs to single spaces, then compare; if two arms hash equal under this normalization, they are byte-identical for the purpose of this rule.

      If two arms are identical-modulo-whitespace, you MUST either:

      1. **Refactor the function** to extract the duplicate sub-block to a private helper BEFORE output. The helper is added in the same file (or to the canonical shared-library location surfaced by inventory §2 / §3a if appropriate — recall §3a inventoried pre-existing dual-path helpers expressly so EXTEND remains the preferred verdict over authoring a new duplicate). The refactored arms call the helper. No BLOCKED report needed — proceed inline; the diff at REVIEWER time shows a clean single-source-of-truth.

      2. **Return BLOCKED** if consolidating would change the SPEC §B.4 step structure (e.g. the duplicate is intentional per a documented divergence justification in SPEC §B.5.x, OR the SPEC's contract requires intra-symbol independence between the arms for some explicit reason):

           BLOCKED: 7e-intra-symbol-duplication — <new-symbol> has byte-identical arms at logical lines <N> and <M>; consolidating would change the SPEC §B.4 step structure; recommend SPEC amendment with explicit §B.5.x divergence justification per branch.

         Route to the orchestrator per the BLOCKED contract at the top of this prompt. Do NOT ship the duplicate with a "// will consolidate later" comment — that is the exact anti-pattern this rule exists to stop, mirroring the 7d HARD RULE's "// Mirrors <other file> verbatim" anti-pattern at the consumer-side analogue.

      Genuine intra-symbol divergence is NOT duplication: if two arms differ in even one non-whitespace, non-identifier token (e.g. different SQL projection list, different boolean literal, different sealed string), they are NOT byte-identical and this rule does not fire. Same discipline as 7d: targets accidental copy-paste, not intentional twins.

      Empirical motivation: ToscanAI/value-investing#449's `findCompanyByTicker` shipped with two byte-identical `await db<…>` SQL blocks; the implementer-side self-check at authoring time would have surfaced the duplication BEFORE the PR's diff reached REVIEWER. 7e-implement is the SPEC_ADVERSARY 7e finding's authoring-time complement — same producer-side concern, caught at the moment of code generation.

      ### HARD RULE — §7.2 byte-identical added-block diff lint (sub-check 7e-seal)

      After your implementation commit lands on the feature branch and BEFORE running `git push --set-upstream origin {config[branch_name]}` (i.e. at the post-commit, pre-push boundary), run the diff-lint command below against the feature branch:

          git diff main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' '*.py' '*.go' '*.rs' '*.java' '*.kt' '*.swift' \
            | grep '^+' | grep -v '^+++' \
            | sed 's/^+//' \
            | sort | uniq -c | awk '$1 >= 2 && length($0) > 50'

      Each line of output is a candidate duplicate (a line of 50+ characters that appears 2 or more times in the ADDED lines across the whole diff, in any file). Inspect the candidates:

      - **Zero candidates**: lint passes — proceed to push.
      - **Contiguous-3-line failure gate**: if any candidate spans a contiguous block of 3 or more adjacent lines (i.e. the duplicate is a multi-line block, not just one stray identical line), the lint FAILS. Either resolve the duplicate inline (extract to a shared helper — same path as the 7e-implement refactor) and amend the commit, OR return BLOCKED:

           BLOCKED: 7e-seal-diff-lint — <file>:<line-A>..<line-B> and <file>:<line-C>..<line-D> are byte-identical <N>-line blocks; consolidation would change the SPEC §B.4 step structure; recommend SPEC amendment.

      - **Single-line candidates** (boilerplate `}};` closers, common import statements, framework-generated stubs, copyright headers, `# noqa` comments): record them in `{output_dir}/implement.md` under a `## §7.2 diff lint candidates (single-line, accepted)` heading with a one-line rationale per candidate, then proceed to push. These do NOT fail the lint; the rationale exists for REVIEWER transparency.

      The lint is a pure static grep — no LLM round-trip — and runs at the IMPLEMENT/push boundary so REVIEWER receives a diff with all multi-line duplicate-block candidates resolved or audit-locked. Threshold parameters (`length($0) > 50`, `$1 >= 2`, contiguous-3-line gate) are intentionally tunable; the defaults are calibrated against the value-investing#449 motivating case (two 5-line `await db<…>` blocks at >70 characters each).

      This HARD RULE complements 7d (consumer-side caller enumeration) and 7e-implement (intra-symbol arm comparison) by adding a cross-file diff lint: 7d catches "new symbol duplicates EXISTING symbol"; 7e-implement catches "intra-symbol arms duplicate each other"; 7e-seal catches "diff contains byte-identical multi-line blocks across any file pair in the diff" — defense in depth across producer-side variants. The §7.2 label preserves issue #6's nomenclature; the lint physically lives in this `implement` phase (NOT in a separate Phase 7 — this YAML's pipeline numbering goes 0, 1a, 1b, 1c, 2, 2c, 3, 3b, 4, 4b, 5 — no literal Phase 7).

      ## Previous Work
      {phase_summary}

      Read the spec at: {output_dir}/spec.md
      Read the acceptance tests at the language-appropriate path: `{output_dir}/acceptance_tests.py` (Python) OR `{output_dir}/acceptance_tests.js` (TypeScript/JavaScript) OR `{output_dir}/acceptance_tests_test.go` (Go) OR `{config[repo_path]}/scripts/verify-<issue>.sh` (bash — Phase-2c SEAL commit body records the canonical sha256; the script is byte-stable and MUST NOT be modified by IMPLEMENT — any apparent defect is a candidate for SEAL BROKEN via narrow re-review).

      ## Repository
      **Path:** {config[repo_path]}
      **Branch:** {config[branch_name]}
      **Style:** {config[style_guide]}

      ## Task
      1. Read the spec carefully
      2. Read the acceptance tests — understand every behavioral contract they assert
      3. Switch to the feature branch FIRST:
         - Try `git checkout {config[branch_name]}` (if branch exists)
         - If it doesn't exist: `git checkout -b {config[branch_name]}`
         - IMPORTANT: Do NOT write any code on main. Verify you are on the correct branch before making changes.
      4. Implement ALL changes described in the spec such that acceptance tests pass
      5. Write clean, documented code following the style guide
      6. If `{output_dir}/acceptance_results.json` exists and shows prior failures
         (from the acceptance_run phase — `"phase": "acceptance_run"`), read the
         `failure_details` field carefully and fix the code to make those tests pass.
      7. Commit with message referencing the issue: `feat/fix(#issue): description`
      8. **§7.2 diff lint** — Run the byte-identical added-block diff-grep command from the HARD RULE above; resolve any contiguous-3-line candidate by extracting a shared helper and amending the commit, OR return BLOCKED with category `7e-seal-diff-lint`. Single-line candidates may be accepted with a recorded rationale under `## §7.2 diff lint candidates (single-line, accepted)` in `{output_dir}/implement.md`. Zero candidates: proceed.
      9. Run the full test suite to verify: `{config[test_command]}`
      10. Push your branch to remote: `git push --set-upstream origin {config[branch_name]}`

      ## Output
      Write a summary of changes to {output_dir}/implement.md including:
      - Files changed with brief description of each change
      - Any deviations from the spec and why
      - Full test suite results (pass/fail count)
      - Commit hash

  # Phase 3b: Engine-executed Acceptance Test Runner
  - id: acceptance_run
    name: "Acceptance Test Runner"
    description: "Engine (or orchestrator skill) executes the acceptance test directly — no agent. Dispatches per config.language: pytest for Python (acceptance_tests.py), jest for TypeScript/JavaScript (acceptance_tests.js/.ts), go test for Go (acceptance_tests_test.go), bash for shell verify-scripts (scripts/verify-<issue>.sh). Writes engine-verified results to acceptance_results.json. For non-Python languages, the orchestrator skill (orchemist-run.md) implements the per-language dispatch; the engine handler defaults to pytest only when config.language is unset or 'python'."
    task_type: acceptance_run
    max_iterations: 3
    working_dir: "{config[repo_path]}"
    transitions:
      success: review
      failed: implement
      exhausted: postmortem_review

  # Phase 4: Code Review (Opus)
  - id: review
    name: "Opus Code Review"
    description: "Senior code review by Opus — quality gate with APPROVE/REQUEST_CHANGES verdict"
    model_tier: opus
    thinking_level: high
    max_iterations: 3
    supervisor: true
    supervisor_model: opus
    supervisor_rubric: |
      Evaluate the code review quality:
      - Did it identify real issues vs nitpicks?
      - Are security concerns addressed?
      - Is backward compatibility verified?
      - Are the suggested fixes actionable?
    transitions:
      approve: test
      request_changes: fix
      abort: fix
      success: test
      failed: review
      timeout: review
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the REVIEW phase. Your verdict determines whether the code proceeds to testing or goes back for fixes. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a senior code reviewer (Opus-tier). Your job is to catch bugs, security issues, and design problems.

      ## GROUND TRUTH — The Issue This Code Must Implement
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The code you are reviewing must implement the feature in the issue above. Before reviewing for correctness, security, edge cases, or backward compatibility, run `git diff main...{config[branch_name]}` and verify the diff actually implements THIS issue. If the diff implements a different system, project, or feature than the issue above, your verdict on line 1 is `ABORT` followed by the single finding:

        [BLOCKER][correctness] diff implements <other topic> instead of issue "<issue title>" — implementation must be redone from a corrected spec

      Do NOT invent issues about features that are not in the issue above. Every finding you raise must trace back to a specific changed line or file in the diff.

      ## Previous Work
      {phase_summary}

      ## Prior Rounds
      {iteration_history}

      ## Iteration Context
      If prior rounds exist above, focus on: (1) verifying that prior fixes were applied, (2) finding NEW issues not raised before. Do NOT re-raise issues that were already fixed.

      Read the implementation summary at: {output_dir}/implement.md
      Read the spec at: {output_dir}/spec.md

      ## Repository
      **Path:** {config[repo_path]}
      **Branch:** {config[branch_name]}

      ## Task
      1. Checkout the feature branch: `git checkout {config[branch_name]}`
      2. Run `git diff main...{config[branch_name]}` to see all changes
      3. Review EVERY changed file for:
         - **Correctness** — Does it do what the spec says?
         - **Security** — Injection, path traversal, unsafe operations?
         - **Edge cases** — Missing error handling, boundary conditions?
         - **Backward compatibility** — Does it break existing behavior?
         - **Test coverage** — Are the changes adequately tested?

      4. Project sub-checks (apply in addition to the 5 categories above):

         **Sub-check 1d — TS `as` cast in reject probes:** any new `as` cast on a load-bearing literal in a TypeScript reject probe is `[BLOCKER][correctness]`. The cast collapses the literal to the asserted type — the probe silently passes without proving rejection. Canonical fix: typed `const` LHS with direct literal assignment, or `satisfies`.

         **Sub-check 5a — Closed-union set-equality:** for each closed union declared by the spec or introduced by the diff, count the union members vs the test-coverage members. Every member MUST appear in at least one test. Flag `[MAJOR][test_coverage]` for any uncovered member.

         **Sub-check 5b — Deferred-as-ok inflation:** scan the diff for any test-output line of the form `ok ".*DEFERRED.*"`, `ok ".*PENDING.*"`, or `ok ".*SKIPPED.*"` (or the language equivalent). The `ok` helper increments the pass counter — a contract that was NOT exercised inflates the summary. Canonical fix: a dedicated `defer_contract` helper with separate counter. Flag `[MAJOR][test_coverage]`.

         **Sub-check 7a — Production-code-for-test-convenience:** any of the following IMPLEMENT-introduced production-code modifications added SOLELY to satisfy a sealed test assertion is `[BLOCKER][correctness]`:
         - Test-only DB migration (column rename/alias/CHECK-relaxation whose only consumer is a verify query)
         - Test-only env-var knob (`process.env.X` reads that only alter test-environment behavior)
         - Test-only `NODE_ENV === 'test'` (or equivalent) branching in production modules

         **Sub-check 7d — Re-implementation of existing symbol:** before approving, verify every NEW top-level helper / loader / formatter / type / component / hook / utility in the diff was checked against existing equivalents.

         **Sticky enforcement (v4 — Phase-0 existing-symbols inventory):** read `{output_dir}/existing_symbols.md` and cross-check EVERY new file/symbol in the diff against inventory sections 1-4. For each new symbol, verify ONE of:
         - (a) **Consume verified** — the diff imports the canonical existing symbol from its inventory path (e.g. `import {{ Dialog }} from '@<scope>/ui/dialog'` — un-escape `{{`/`}}` to single-brace characters when writing the file; the doubling is a Python-format escape required by this prompt template).
         - (b) **Divergence justified** — spec.md has a `## Divergence justification` subsection naming the existing symbol + the contract-required difference; the diff implements the divergence as documented.
         - (c) **Authored as new** — the new symbol IS recorded in inventory §6 ("SPEC's proposed new symbols") with rationale; the diff authors it at the proposed path. Arm-(c) requires the §6 entry to be specific: `<symbol-name>` ← `<proposed-path:line>` ← (rationale: why no existing inventory entry suffices). A §6 entry that merely says "new symbol" without the path AND the rationale is NOT a valid arm-(c) — flag as `[MAJOR][test_coverage]` against inventory hygiene.

         Any new symbol in the diff that overlaps with inventory §1-4 WITHOUT one of (a)/(b)/(c) is `[MAJOR][correctness]` — REQUEST_CHANGES is the canonical disposition. Do NOT approve with a "follow-up issue" or "we'll consolidate later" carve-out unless the duplicate is across a HARD-NO byte-locked file (in which case, cite the specific verify-script line that locks the byte). Even when the duplication does not break correctness, the carve-out pattern accrues unbounded debt — proven by ToscanAI/value-investing Wave-8 closure dropping 18 catalogued dup groups → 15 fresh candidates within one EPIC cycle. REQUEST_CHANGES; the orchestrator routes to FIX phase for inline consolidation (R2 fix-pass). The "redundancy is a separate program" doctrine means "Wave-N batches happen as their own PRs" — NOT "individual PRs may carve out follow-ups instead of consolidating inline".

         **Sub-check 7h — Diff-symmetric cross-file new-symbol grep (added 2026-05-31 — post-Wave-8 dedup audit):** beyond the inventory §1-4 cross-check above, run an ALWAYS-ON grep against the diff's newly-exported symbols. For every new top-level export in `git diff main...{config[branch_name]}` (functions, classes, interfaces, type aliases, const-as-function), grep the ENTIRE monorepo for an existing function with the IDENTICAL name OR a byte-near-identical body (md5 of normalised body, ignoring whitespace/comments). The targets: `apps/web/`, `packages/*/src/`, `jobs/*/src/`, `scripts/_shared/`. If an existing site is found, flag `[MAJOR][correctness]` with the existing-site `path:line` link and REQUEST_CHANGES. This catches name-collisions even when the inventory is incomplete or the new symbol's path is outside the inventory's pre-configured globs (Phase 0 is greenfield-scoped; 7h is the symmetric REVIEWER-time safety net). Required even when inventory §1-4 are fully populated — the inventory is the AUTHORING-time guard; 7h is the REVIEW-time peer.

         **Backward-compat short-circuit:** if `{output_dir}/existing_symbols.md` sections 1-4 are ALL empty-stubs ("(empty — consumer did not provide inventory inputs)"), the 3-arm test does NOT short-circuit to "no findings". Instead fall back to ad-hoc grep against the standard targets (project UI primitive package(s), `lib/`/`utils/`, sibling files in target directory, workspace barrels) and apply the same 3-arm logic. The Phase-0 inventory is the PRIMARY signal but not the ONLY signal — v3-fallback consumers still get the late-catch via this ad-hoc grep. Sub-check 7h (above) ALSO runs even when the inventory is fully populated — it is the always-on REVIEWER-time peer to the inventory's authoring-time guard.

         Search targets when the inventory is absent OR incomplete (fallback to ad-hoc grep):
         - Project UI primitive package(s) (Dialog, Badge, Alert, Popover, Toast, Skeleton, Tooltip, Tabs, Card, Input, Button, Label, etc.)
         - Project shared libraries (`lib/`, `utils/`, `_shared/`)
         - Sibling files in the same directory (`*-data.ts`, `_loaders/`, `__tests__/`)
         - Cross-package symbols accessible via the workspace
         A near-identical implementation rebuilt from scratch is `[MAJOR][correctness]` — recommend refactor to consume, or rename to remove name-collision risk if contracts genuinely diverge. (Lesson recorded after a production audit where a UI-feature PR missed three UI-primitive duplications: Dialog rebuilt while `@<your-org>/ui/Dialog` existed; Badge rebuilt while a sibling Badge primitive existed; a helper named identically to an existing project helper in `lib/`. The v4 Phase-0 inventory + sticky-7d enforcement is the structural fix for this class.)

         **Sub-check 7d-producer — Intra-symbol return-arm comparison:** in addition to the 7d-consumer 3-arm enumeration above (which catches "new symbol re-implements EXISTING inventory entry"), for every NEWLY-CREATED exported function or method in the PR diff that has more than one `return` or `throw` statement (or the language equivalent — Python `return` / `raise`, Go `return`, Rust `Ok` / `Err` arms, bash function `echo` + `exit` arms):

         1. **Quote each return/throw arm VERBATIM in `review.md`** — one fenced code block per arm, citing `file:line` for the arm's leading token (e.g. `# apps/web/lib/queries/companies.ts:8-13`). The verbatim quote is evidentiary; do NOT paraphrase.
         2. **Assert that at least ONE non-whitespace, non-identifier token differs between any two arms.** If two arms are identical-modulo-whitespace-modulo-identifiers (same SQL projection list, same destructuring shape, same type assertion, same call-site signature), flag `[MAJOR][correctness] intra-symbol dual-path duplication at <file>:<line-A> and <file>:<line-B>` as a REQUEST_CHANGES finding. Recommend refactor to extract the duplicate sub-block to a private helper (R2 fix-pass) OR confirm the IMPLEMENT phase returned BLOCKED per HARD RULE 7e-implement (in which case the case routes to SPEC amendment, not a REVIEWER finding).
         3. **SPEC §B.5.x divergence-justification short-circuit:** if `spec.md` §B.5 names the dual-path explicitly with a divergence justification (per the SPEC_ADVERSARY 7e check's path-(b) escape — "document a divergence justification per branch in §B.5.x"), read §B.5 first and skip the arm comparison for arms that have an explicit §B.5.x justification entry. Cite the §B.5.x entry in `review.md` to document the skip (e.g. "Arms A and B identical-modulo-whitespace but §B.5.3 justifies via SB#2 fixture short-circuit boundary — short-circuit applied; no finding."). The §B.5.x justification MUST itself meet the concreteness bar (cites sealed string / sort order / precision / type narrowing / environment boundary — NOT "different use case"); a non-concrete §B.5.x triggers `[MAJOR][correctness] 7d-producer §B.5.x justification non-concrete` instead of the duplication finding.

         This is the producer-side complement to the 3-arm 7d-consumer cross-check above: 7d-consumer catches new symbols that duplicate EXISTING inventory entries (caller-enumeration); 7d-producer catches new symbols whose own body contains intra-file byte-identical fragments (producer-enumeration). Empirical motivation: ToscanAI/value-investing#449 (lift commit `11db4eb`) shipped `findCompanyByTicker` with two byte-identical `await db<…>` SQL blocks separated by a fixture short-circuit; the 7d-consumer enumeration APPROVED because the symbol was newly-created (no inventory entry to consume), but 7d-producer's arm comparison would have flagged the intra-file duplication.

         An LLM REVIEWER can quote-and-compare verbatim arms reliably; normalized-hash α-conversion (originally proposed in issue #6 but downgraded per audit R1) requires AST manipulation an LLM would simulate inconsistently. The verbatim-quote requirement is the same level of concreteness as the existing 3-arm cross-check above.

         **HARD RULE — Inverse silent test amendment:** verify that any sealed test pin (numeric tolerance, strict-equality literal, exact-string assertion) is byte-identical to its state at the SEAL commit. If the IMPLEMENT phase modified a sealed pin without an accompanying audit-locked seal-break cycle (separate SEAL BROKEN commit + narrow re-review + re-seal), that is `[BLOCKER][correctness]` — inverse silent amendment. Even when the new pin is mathematically correct, the protocol violation is the issue. Recovery: route to retroactive narrow re-review for the audit lock. (This rule is the REVIEW-phase guard for the same HARD RULE the IMPLEMENT phase enforces preemptively; the two are intentionally paired.)

      5. Seal-break audit-trail verification (when applicable):

         If the branch contains any `SEAL BROKEN` commit, verify the canonical 4-step seal-break protocol (all 4 steps are commits; the narrow re-review APPROVE verdict is captured as an audit-trail reference inside step 2's SEAL BROKEN commit body — NOT as a separate fifth commit):

           1. `chore(#N): seal verify-<issue>.sh` (or equivalent SEAL commit) — records pre-amendment sha256
           2. `test(#N): amend §<section> — SEAL BROKEN <reason>` — explicit SEAL BROKEN marker in body; the narrow re-review APPROVE verdict is captured in this commit's body as audit-trail reference (not a separate commit)
           3. `chore(#N): re-seal verify-<issue>.sh after §<section> fix` — records post-amendment sha256
           4. `feat(#N)`/`fix(#N)` impl commit AFTER the re-seal

         Any deviation (bundled SEAL BROKEN + impl commit; missing re-seal commit; missing audit-lock reference) is `[MAJOR][correctness]` — recovery is retroactive narrow re-review and a corrective re-seal commit.

      ## HARD RULE — Post-review-commit triggers new round

      Any commit made after a reviewer's verdict triggers another reviewer round. Do NOT approve based on a stale state. If commits exist on the branch after this review's prior round (visible in `git log`), the verdict applies to the LATEST commit — do not assume earlier-round approvals carry forward. This rule covers BOTH impl/fix commits AND reviewer self-amendments to `review.md` after the verdict line — do NOT silently edit the prior round's review; emit a new round (`review_roundN+1.md`) with a fresh verdict.

      ## Output
      Write your review to {output_dir}/review.md.

      **IMPORTANT:** Your response MUST start with one of these verdicts on the very first line:
      - `APPROVE` — code is ready to merge (no blockers, at most minor issues)
      - `REQUEST_CHANGES` — one or more blockers or major issues found
      - `ABORT` — fatal issue discovered, pipeline cannot continue safely

      **DO NOT** write any preamble, commentary, or "thinking out loud" text before the verdict.
      The very first line of review.md must be the verdict word and nothing else.

      ## Structured Output Format
      Your review.md MUST follow this exact structure:

      Line 1: APPROVE  -or-  REQUEST_CHANGES  -or-  ABORT  (nothing else on this line)

      Then for each issue found, one line per issue using this tag format:
        [SEVERITY][category] description of the issue

      Where SEVERITY is one of: BLOCKER, MAJOR, MINOR, NITPICK
      And category is a short label such as: security, correctness, style,
        performance, test, compatibility, design

      ✅ CORRECT example:
      Correct example:
        REQUEST_CHANGES
        [BLOCKER][security] SQL query in db.py:42 uses string concatenation — use parameterized queries
        [MAJOR][correctness] parse_output() returns None instead of empty list when input is empty
        [MINOR][style] Missing docstring on helper function _build_query()
        [NITPICK][style] Trailing whitespace on line 18 of utils.py

      ❌ WRONG — never start with preamble before the verdict:
      WRONG — never start with preamble before the verdict:
        Now let me run the tests first to check the implementation...
        REQUEST_CHANGES
        [BLOCKER][security] ...

      If there are no issues (APPROVE with clean code), write only:
        APPROVE

      Do NOT use any other tag format. Do NOT add extra headers or sections
      between the verdict line and the issue lines.

  # Phase 4b: Fix Review Feedback
  - id: fix
    name: "Apply Review Fixes"
    description: "Address code review feedback, then re-verify behavioral contracts before re-review"
    model_tier: sonnet
    thinking_level: low
    max_iterations: 3
    transitions:
      success: acceptance_run
      failed: fix
      timeout: fix
      exhausted: postmortem_review
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the FIX phase of an automated coding pipeline. Your output feeds a re-review — not a human. Do not ask questions, request clarification, or send messages to external channels. Deliver your complete output as structured text following the format below. [/PIPELINE CONTEXT]

      You are a developer addressing code review feedback.

      ## GROUND TRUTH — The Issue This Fix Must Support
      **Title:** {config[issue_title]}
      **Body:** {config[issue_body]}

      The fixes you apply must support the feature in the issue above. Before applying any fix from `review.md`, verify the review finding is about THIS issue's feature. If `review.md` requests changes for a different system, project, or feature than the issue above, write `BLOCKED: review topic mismatch — review.md describes <other topic> instead of issue '<issue title>'` to `{output_dir}/fix.md` and do NOT modify any files in the repository or create any commits.

      Do NOT apply speculative fixes for features not in the issue above. Every code change must address a specific finding in `review.md` that relates to this issue.

      ## Previous Work
      {phase_summary}

      ## Prior Rounds
      {iteration_history}

      ## Iteration Context
      If prior rounds exist above, do NOT re-apply fixes already committed. Focus only on NEW issues from the latest review.

      Read the code review at: {output_dir}/review.md
      Read the original spec at: {output_dir}/spec.md
      Read the existing-symbols inventory at: {output_dir}/existing_symbols.md (Phase-0 sticky reference; sub-check 7d applies to FIX too — any fix that introduces a NEW symbol overlapping inventory §1-4 is the same 7d violation IMPLEMENT would have raised BLOCKED on. Read §1-4 + §6 BEFORE authoring any new symbol while addressing review findings; if a fix requires duplication, return BLOCKED to {output_dir}/fix.md instead of authoring the duplicate.)

      ## Repository
      **Path:** {config[repo_path]}
      **Branch:** {config[branch_name]}

      ## Task
      1. Checkout the feature branch: `git checkout {config[branch_name]}`
      2. Read the code review carefully
      3. If the review says APPROVE with no blockers — write "No fixes needed" to {output_dir}/fix.md and stop
      4. If REQUEST_CHANGES — apply ALL fixes mentioned:
         - Address every blocker and major issue
         - Address minor issues where practical
         - IMPORTANT: Only modify code directly related to the reviewer's feedback. Minimal diff.
      5. Run tests: `{config[test_command]}`
      6. Commit fixes on this branch: `fix: address code review feedback`
      7. Push your branch to remote: `git push origin {config[branch_name]}`

      ## Output
      Write to {output_dir}/fix.md:
      - Each issue addressed and how
      - Any issues intentionally deferred and why
      - Updated test results
      - Commit hash

  # Phase 5b: Review Postmortem (runs only on exhausted — review/fix could not converge)
  - id: postmortem_review
    name: "Review Loop Exhaustion Postmortem"
    description: "When the review/fix loop exhausts iterations without approval, extract persistent review findings and diagnose why fixes failed to satisfy the reviewer."
    model_tier: sonnet
    thinking_level: medium
    transitions: {}
    prompt_template: |
      [PIPELINE CONTEXT] You are executing the POSTMORTEM phase of an automated coding pipeline. The review and fix phases exhausted their iteration limit without the reviewer approving the implementation. Your job is to extract the reviewer's unresolved findings and diagnose why the fix agent could not satisfy them. Do not ask questions or send messages. [/PIPELINE CONTEXT]

      You are a technical analyst performing a postmortem on a failed review/fix OR test_adversary cycle.

      ## Pipeline Context
      **Issue:** {config[issue_title]} (#{config[issue_number]})
      **Repository:** {config[repo_path]}
      **Branch:** {config[branch_name]}
      **What happened:** EITHER (a) the reviewer and fix agent went through multiple rounds without the reviewer approving the implementation, OR (b) the TEST_ADVERSARY (Phase 2c) and acceptance_test phases went through multiple rounds without the adversary approving the test artefact. Examine `{output_dir}/` to determine which case applies — presence of `review_round*.md` indicates the review/fix exhaustion; presence of `test_adversary_round*.md` without a sealed artefact indicates the test_adversary exhaustion.

      ## Current Files
      Read the latest review at: {output_dir}/review.md
      Read the latest fix notes at: {output_dir}/fix.md
      Read the implementation spec at: {output_dir}/spec.md
      Read the behavioral contracts at: {output_dir}/behavioral.md

      ## Round History
      Read ALL round files from {output_dir}/ to understand the full evolution:
      - **For review/fix exhaustion:** `review_round1.md`, `fix_round1.md`, `review_round2.md`, `fix_round2.md`, etc. — these contain the complete review/fix exchange across all rounds.
      - **For test_adversary exhaustion:** `test_adversary_round1.md`, `acceptance_test_round2.md` (the revision-round artefact), `test_adversary_round2.md`, etc. — these contain the test-artefact ↔ adversary exchange across all rounds.

      ## Your Task

      1. **Identify persistent findings** — Which review findings appeared in multiple rounds and were never resolved?
      2. **Root cause analysis** — For each persistent finding, explain WHY the fix agent failed to resolve it. Common causes:
         - The fix is cosmetic but the reviewer wants a structural change
         - The fix introduces a new issue while solving the flagged one
         - The fix agent lacks context about architectural constraints
         - The review finding is subjective or contradicts the spec
         - The acceptance tests pass but the reviewer wants changes beyond the spec
      3. **Assessment** — For each persistent finding, classify it:
         - **Spec gap:** The behavioral contracts don't cover this — needs a spec update
         - **Implementation gap:** The code doesn't satisfy an existing contract — needs a better fix
         - **Scope creep:** The reviewer is asking for changes beyond the issue scope — document and defer
         - **Contradiction:** The reviewer's request conflicts with the spec or acceptance tests — escalate

      Write your full postmortem to {output_dir}/postmortem_review.md

      The pipeline ends here. The findings should inform the next pipeline run or a manual intervention.

  # Phase 5: Test Verification (Command Phase)
  - id: test
    name: "Test Verification"
    description: "Run full test suite to verify no regressions. Command resolves from config.test_command; allowed_commands lists the safelisted executables per language."
    task_type: command
    command: "{config[test_command]}"
    working_dir: "{config[repo_path]}"
    allowed_commands: ["python3", "python", "pytest", "npm", "npx", "pnpm", "yarn", "node", "jest", "vitest", "go", "bash", "sh", "make"]

# Auto-merge configuration
auto_merge:
  enabled: true
  min_score: 0.90
  require_approve: true
  strategy: squash

# Confidence-based routing
routing_config:
  tiers:
    - name: auto_merge
      min_score: 0.90
      max_score: 1.01
      requires: ["tests_pass"]
      notify: ["log"]
    - name: human_review
      min_score: 0.75
      max_score: 0.90
      requires: []
      notify: ["log"]
    - name: auto_retry
      min_score: 0.50
      max_score: 0.75
      requires: []
      notify: ["log"]
      strategy: escalate_model
      max_retries: 1
    - name: reject
      min_score: 0.0
      max_score: 0.50
      requires: []
      notify: ["log"]
